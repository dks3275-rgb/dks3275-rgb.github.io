<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 내역 - AU 관리자</title>
<meta name="theme-color" content="#0f2744">
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD6r6R593RIfe8GCMjM3lgQgCcfiF0Rbuc",
    authDomain: "au-ilhaksub.firebaseapp.com",
    projectId: "au-ilhaksub",
    storageBucket: "au-ilhaksub.firebasestorage.app",
    messagingSenderId: "407960160823",
    appId: "1:407960160823:web:1e830d6b0d69e4a7b84db2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window._db = db;
  window._col = collection;
  window._getDocs = getDocs;
  window._doc = doc;
  window._updateDoc = updateDoc;
  window._deleteDoc = deleteDoc;
  window._query = query;
  window._orderBy = orderBy;
  window._fbReady = true;

  // 페이지 로드 시 자동 불러오기
  window.addEventListener('load', () => {
    setTimeout(loadConsulting, 500);
  });
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root {
    --navy: #0f2744; --blue: #1a4a8a; --accent: #e8a020;
    --light: #f0f4f8; --white: #ffffff; --gray: #8a9ab5;
    --success: #2ecc71; --danger: #e74c3c; --border: #e2e8f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--light); min-height: 100vh; padding-bottom: 40px; }

  .header { background: var(--navy); padding: 20px 20px 24px; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(232,160,32,0.12); }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .back-btn { background: rgba(255,255,255,0.12); border: none; color: white; width: 36px; height: 36px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }
  .header-badge { background: var(--accent); color: var(--navy); font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .header h1 { color: white; font-size: 22px; font-weight: 900; }
  .header-sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 4px; }

  .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
  .toolbar-left { display: flex; align-items: center; gap: 10px; }
  .count-badge { background: var(--navy); color: white; font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 20px; }
  .filter-select { background: white; border: 2px solid var(--border); border-radius: 10px; padding: 8px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--navy); outline: none; cursor: pointer; }
  .refresh-btn { background: white; border: 2px solid var(--border); border-radius: 10px; padding: 8px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--navy); cursor: pointer; font-weight: 600; transition: all 0.2s; }
  .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }

  .consulting-card {
    background: white; border-radius: 16px; padding: 20px;
    margin-bottom: 14px; box-shadow: 0 2px 8px rgba(15,39,68,0.08);
    border-left: 4px solid var(--border);
    transition: transform 0.15s;
  }
  .consulting-card:hover { transform: translateY(-1px); }
  .consulting-card.waiting { border-left-color: var(--accent); }
  .consulting-card.done { border-left-color: var(--success); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px; }
  .card-person { display: flex; align-items: center; gap: 10px; }
  .card-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--navy); color: white; font-size: 16px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-name { font-size: 16px; font-weight: 800; color: var(--navy); }
  .card-dept { font-size: 12px; color: var(--gray); margin-top: 2px; }

  .status-toggle {
    padding: 5px 14px; border-radius: 20px; border: none;
    font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .status-waiting { background: #fef3c7; color: #92400e; }
  .status-done { background: #d1fae5; color: #065f46; }

  .card-content { background: var(--light); border-radius: 10px; padding: 14px; font-size: 14px; color: #334155; line-height: 1.6; margin-bottom: 12px; }

  .card-bottom { display: flex; justify-content: space-between; align-items: center; }
  .card-time { font-size: 11px; color: var(--gray); }
  .delete-btn { background: #fee2e2; color: var(--danger); border: none; border-radius: 8px; padding: 6px 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .delete-btn:hover { background: var(--danger); color: white; }

  .empty { text-align: center; padding: 60px 20px; color: var(--gray); }
  .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .empty-text { font-size: 15px; }

  .loading { text-align: center; padding: 40px; color: var(--gray); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <a href="admin.html" class="back-btn">←</a>
    <span class="header-badge">관리자</span>
  </div>
  <h1>💬 상담 신청 내역</h1>
  <p class="header-sub">학생들의 1:1 상담 신청을 확인하고 처리하세요</p>
</div>

<div class="container">
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="count-badge" id="countBadge">불러오는 중...</span>
      <select class="filter-select" id="filterSelect" onchange="renderList()">
        <option value="all">전체 보기</option>
        <option value="대기중">대기중만</option>
        <option value="완료">완료만</option>
      </select>
    </div>
    <button class="refresh-btn" onclick="loadConsulting()">🔄 새로고침</button>
  </div>

  <div id="listContainer">
    <div class="loading">📋 상담 내역 불러오는 중...</div>
  </div>
</div>

<script>
  let allItems = [];

  async function loadConsulting() {
    if (!window._fbReady) { setTimeout(loadConsulting, 300); return; }
    document.getElementById('listContainer').innerHTML = '<div class="loading">📋 불러오는 중...</div>';
    try {
      const q = window._query(
        window._col(window._db, 'consulting'),
        window._orderBy('createdAt', 'desc')
      );
      const snapshot = await window._getDocs(q);
      allItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderList();
    } catch(e) {
      // createdAt 인덱스 없을 때 폴백
      try {
        const snapshot = await window._getDocs(window._col(window._db, 'consulting'));
        allItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        allItems.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        renderList();
      } catch(e2) {
        document.getElementById('listContainer').innerHTML =
          '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">데이터를 불러올 수 없어요</div></div>';
      }
    }
  }

  function renderList() {
    const filter = document.getElementById('filterSelect').value;
    const items = filter === 'all' ? allItems : allItems.filter(i => i.status === filter);

    document.getElementById('countBadge').textContent =
      `총 ${allItems.length}건 · 대기 ${allItems.filter(i=>i.status==='대기중').length}건`;

    if (items.length === 0) {
      document.getElementById('listContainer').innerHTML =
        '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">상담 신청 내역이 없어요</div></div>';
      return;
    }

    document.getElementById('listContainer').innerHTML = items.map(item => `
      <div class="consulting-card ${item.status === '완료' ? 'done' : 'waiting'}" id="card-${item.id}">
        <div class="card-top">
          <div class="card-person">
            <div class="card-avatar">${item.name ? item.name.charAt(0) : '?'}</div>
            <div>
              <div class="card-name">${item.name || '-'}</div>
              <div class="card-dept">${item.dept || '-'}</div>
            </div>
          </div>
          <button class="status-toggle ${item.status === '완료' ? 'status-done' : 'status-waiting'}"
            onclick="toggleStatus('${item.id}', '${item.status}')">
            ${item.status === '완료' ? '✅ 완료' : '⏳ 대기중'}
          </button>
        </div>
        <div class="card-content">${item.content || '-'}</div>
        <div class="card-bottom">
          <span class="card-time">📅 ${item.time || '-'}</span>
          <button class="delete-btn" onclick="deleteItem('${item.id}')">🗑️ 삭제</button>
        </div>
      </div>
    `).join('');
  }

  async function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus === '완료' ? '대기중' : '완료';
    try {
      await window._updateDoc(window._doc(window._db, 'consulting', id), { status: newStatus });
      const idx = allItems.findIndex(i => i.id === id);
      if (idx !== -1) allItems[idx].status = newStatus;
      renderList();
    } catch(e) {
      alert('상태 변경에 실패했어요. 다시 시도해주세요.');
    }
  }

  async function deleteItem(id) {
    if (!confirm('이 상담 신청을 삭제할까요?')) return;
    try {
      await window._deleteDoc(window._doc(window._db, 'consulting', id));
      allItems = allItems.filter(i => i.id !== id);
      renderList();
    } catch(e) {
      alert('삭제에 실패했어요. 다시 시도해주세요.');
    }
  }
</script>
</body>
</html>
