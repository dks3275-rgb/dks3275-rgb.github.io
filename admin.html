<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AU 관리자 - 알림 발송</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

    :root {
      --navy: #0f2744;
      --blue: #1a4a8a;
      --accent: #e8a020;
      --white: #ffffff;
      --gray: #8a9ab5;
      --success: #2ecc71;
      --danger: #e74c3c;
      --light: #f0f4f8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--light);
      color: #2d3748;
      min-height: 100vh;
    }

    .header {
      background: var(--navy);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-badge {
      background: var(--accent);
      color: var(--navy);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .header h1 {
      color: white;
      font-size: 18px;
      font-weight: 700;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--light);
    }

    .group-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 4px;
    }

    .group-btn {
      padding: 14px 8px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: white;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: #4a5568;
      text-align: center;
    }

    .group-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: #f0f5ff;
    }

    .group-btn.selected {
      border-color: var(--navy);
      background: var(--navy);
      color: white;
    }

    .group-btn .icon {
      font-size: 20px;
      display: block;
      margin-bottom: 6px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: #2d3748;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--blue);
    }

    textarea.form-input {
      resize: vertical;
      min-height: 100px;
    }

    .send-btn {
      width: 100%;
      padding: 16px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .send-btn:hover {
      background: var(--blue);
      transform: translateY(-1px);
    }

    .send-btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
      transform: none;
    }

    .result-box {
      display: none;
      padding: 14px 16px;
      border-radius: 10px;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 500;
    }

    .result-box.success {
      background: #f0fff4;
      border: 1.5px solid #68d391;
      color: #276749;
    }

    .result-box.error {
      background: #fff5f5;
      border: 1.5px solid #fc8181;
      color: #c53030;
    }

    .selected-group-display {
      margin-top: 10px;
      font-size: 13px;
      color: var(--gray);
      text-align: center;
    }

    .selected-group-display span {
      font-weight: 700;
      color: var(--navy);
    }

    .history-item {
      padding: 12px;
      background: var(--light);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .history-item .time {
      color: var(--gray);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .history-item .group-tag {
      display: inline-block;
      background: var(--navy);
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 4px;
    }

    .empty-history {
      text-align: center;
      color: var(--gray);
      font-size: 13px;
      padding: 20px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-badge">관리자</div>
  <h1>AU 일학습병행 알림 발송</h1>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">📢 알림 발송</div>

    <div class="form-group">
      <div class="form-label">발송 대상 선택</div>
      <div class="group-buttons">
        <button class="group-btn" onclick="selectGroup('P-TECH 1학년', this)">
          <span class="icon">🎓</span>
          P-TECH<br>1학년
        </button>
        <button class="group-btn" onclick="selectGroup('P-TECH 2학년', this)">
          <span class="icon">🎓</span>
          P-TECH<br>2학년
        </button>
        <button class="group-btn" onclick="selectGroup('전문대 마케팅경영학과', this)">
          <span class="icon">📚</span>
          마케팅<br>경영학과
        </button>
        <button class="group-btn" onclick="selectGroup('전문대 호텔조리학과', this)">
          <span class="icon">🍳</span>
          호텔<br>조리학과
        </button>
        <button class="group-btn" onclick="selectGroup('전문대 회계세무학과', this)">
          <span class="icon">📊</span>
          회계<br>세무학과
        </button>
        <button class="group-btn" onclick="selectGroup('전문대 호텔경영학과', this)">
          <span class="icon">🏨</span>
          호텔<br>경영학과
        </button>
        <button class="group-btn" onclick="selectGroup('전체', this)">
          <span class="icon">📣</span>
          전체<br>발송
        </button>
      </div>
      <div class="selected-group-display" id="selectedDisplay">대상을 선택해주세요</div>
    </div>

    <div class="form-group">
      <label class="form-label">알림 제목</label>
      <input type="text" class="form-input" id="title" placeholder="예: AU 일학습병행 공지" />
    </div>

    <div class="form-group">
      <label class="form-label">알림 내용</label>
      <textarea class="form-input" id="message" placeholder="예: 오늘 오후 3시 비콘 출결 잊지 마세요!"></textarea>
    </div>

    <button class="send-btn" id="sendBtn" onclick="sendNotification()">🔔 알림 발송</button>

    <div class="result-box" id="resultBox"></div>
  </div>

  <div class="card">
    <div class="card-title">📋 발송 기록</div>
    <div id="historyList">
      <div class="empty-history">아직 발송 기록이 없어요</div>
    </div>
  </div>

</div>

<script>
  const APP_ID = "6bed6730-b167-48a8-a98d-83cdcb1cbc10";
  const API_KEY = "os_v2_app_npwwomfrm5ekrkmnqpg4whf4cb23stdpccsegyumkvqgbmq57772nhty6znijrvhuhukz7lippybbcfrhfp6snf24vtr7ttnuogx4ia";

  let selectedGroup = null;
  let history = JSON.parse(localStorage.getItem('sendHistory') || '[]');

  function selectGroup(group, btn) {
    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedGroup = group;
    const display = document.getElementById('selectedDisplay');
    display.innerHTML = `선택됨: <span>${group === '전체' ? '전체 학생' : group}</span>`;
  }

  async function sendNotification() {
    const title = document.getElementById('title').value.trim();
    const message = document.getElementById('message').value.trim();
    const resultBox = document.getElementById('resultBox');
    const sendBtn = document.getElementById('sendBtn');

    if (!selectedGroup) {
      showResult('발송 대상을 선택해주세요!', 'error');
      return;
    }
    if (!title) {
      showResult('알림 제목을 입력해주세요!', 'error');
      return;
    }
    if (!message) {
      showResult('알림 내용을 입력해주세요!', 'error');
      return;
    }

    sendBtn.disabled = true;
    sendBtn.textContent = '발송 중...';

    let body = {
      app_id: APP_ID,
      headings: { en: title, ko: title },
      contents: { en: message, ko: message },
    };

    if (selectedGroup === '전체') {
      body.included_segments = ["Total Subscriptions"];
    } else {
      body.filters = [
        { field: "tag", key: "학년", relation: "=", value: selectedGroup }
      ];
    }

    try {
      const response = await fetch("https://onesignal.com/api/v1/notifications", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Key ${API_KEY}`
        },
        body: JSON.stringify(body)
      });

      const data = await response.json();

      if (data.id) {
        showResult(`✅ 발송 완료! (수신자: ${data.recipients || 0}명)`, 'success');
        addHistory(selectedGroup, title, message, data.recipients || 0);
        document.getElementById('title').value = '';
        document.getElementById('message').value = '';
      } else {
        showResult(`❌ 발송 실패: ${JSON.stringify(data.errors || data)}`, 'error');
      }
    } catch (e) {
      showResult('❌ 오류가 발생했습니다. 다시 시도해주세요.', 'error');
    }

    sendBtn.disabled = false;
    sendBtn.textContent = '🔔 알림 발송';
  }

  function showResult(msg, type) {
    const box = document.getElementById('resultBox');
    box.textContent = msg;
    box.className = `result-box ${type}`;
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 5000);
  }

  function addHistory(group, title, message, recipients) {
    const now = new Date();
    const timeStr = now.toLocaleString('ko-KR');
    history.unshift({ group, title, message, recipients, time: timeStr });
    if (history.length > 20) history.pop();
    localStorage.setItem('sendHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<div class="empty-history">아직 발송 기록이 없어요</div>';
      return;
    }
    list.innerHTML = history.map(h => `
      <div class="history-item">
        <div class="time">${h.time}</div>
        <span class="group-tag">${h.group === '전체' ? '전체' : h.group}</span>
        <div style="font-weight:500; margin-top:4px;">${h.title}</div>
        <div style="color:#4a5568; margin-top:2px;">${h.message}</div>
        <div style="color:#718096; font-size:11px; margin-top:4px;">수신자 ${h.recipients}명</div>
      </div>
    `).join('');
  }

  renderHistory();
</script>
</body>
</html>
