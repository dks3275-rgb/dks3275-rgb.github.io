<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AU 관리자</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
    :root { --navy: #0f2744; --blue: #1a4a8a; --accent: #e8a020; --gray: #8a9ab5; --light: #f0f4f8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--light); color: #2d3748; min-height: 100vh; }
    .header { background: var(--navy); padding: 20px 24px; display: flex; align-items: center; gap: 12px; }
    .header-badge { background: var(--accent); color: var(--navy); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .header h1 { color: white; font-size: 18px; font-weight: 700; }
    .tab-nav { background: white; display: flex; border-bottom: 2px solid var(--light); overflow-x: auto; }
    .tab-nav button { flex: 1; min-width: 80px; padding: 14px 8px; border: none; background: none; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; white-space: nowrap; }
    .tab-nav button.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 700; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .container { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--light); }
    .group-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 4px; }
    .group-btn { padding: 14px 8px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: #4a5568; text-align: center; }
    .group-btn:hover { border-color: var(--blue); color: var(--blue); background: #f0f5ff; }
    .group-btn.selected { border-color: var(--navy); background: var(--navy); color: white; }
    .group-btn .icon { font-size: 20px; display: block; margin-bottom: 6px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: #4a5568; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: #2d3748; transition: border-color 0.2s; outline: none; }
    .form-input:focus { border-color: var(--blue); }
    textarea.form-input { resize: vertical; min-height: 120px; }
    .send-btn { width: 100%; padding: 16px; background: var(--navy); color: white; border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
    .send-btn:hover { background: var(--blue); transform: translateY(-1px); }
    .send-btn:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }
    .result-box { display: none; padding: 14px 16px; border-radius: 10px; margin-top: 14px; font-size: 14px; font-weight: 500; }
    .result-box.success { background: #f0fff4; border: 1.5px solid #68d391; color: #276749; display: block; }
    .result-box.error { background: #fff5f5; border: 1.5px solid #fc8181; color: #c53030; display: block; }
    .selected-group-display { margin-top: 10px; font-size: 13px; color: var(--gray); text-align: center; }
    .selected-group-display span { font-weight: 700; color: var(--navy); }
    .history-item { padding: 12px; background: var(--light); border-radius: 8px; margin-bottom: 8px; font-size: 13px; }
    .history-item .time { color: var(--gray); font-size: 11px; margin-bottom: 4px; }
    .history-item .group-tag { display: inline-block; background: var(--navy); color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-bottom: 4px; }
    .empty-history { text-align: center; color: var(--gray); font-size: 13px; padding: 20px; }
    .notice-item { padding: 14px; background: var(--light); border-radius: 10px; margin-bottom: 10px; }
    .notice-item-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .notice-item-meta { font-size: 11px; color: var(--gray); display: flex; justify-content: space-between; align-items: center; }
    .delete-btn { background: #fff5f5; border: 1px solid #fc8181; color: #c53030; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
    .file-upload { border: 2px dashed #e2e8f0; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .file-upload:hover { border-color: var(--blue); }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 8px; }
    .preview-img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; }
    .upload-progress { font-size: 13px; color: var(--gray); margin-top: 8px; text-align: center; }

    /* 상담 탭 스타일 */
    .consulting-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .count-badge { background: var(--navy); color: white; font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 20px; }
    .filter-select { background: white; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 8px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--navy); outline: none; cursor: pointer; }
    .refresh-btn { background: white; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 8px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--navy); cursor: pointer; font-weight: 600; }
    .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }
    .consulting-card { background: var(--light); border-radius: 14px; padding: 18px; margin-bottom: 12px; border-left: 4px solid #e2e8f0; transition: transform 0.15s; }
    .consulting-card:hover { transform: translateY(-1px); }
    .consulting-card.waiting { border-left-color: var(--accent); }
    .consulting-card.done { border-left-color: #48bb78; }
    .c-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
    .c-person { display: flex; align-items: center; gap: 10px; }
    .c-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--navy); color: white; font-size: 15px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .c-name { font-size: 15px; font-weight: 800; color: var(--navy); }
    .c-dept { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .status-toggle { padding: 5px 12px; border-radius: 20px; border: none; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .status-waiting { background: #fef3c7; color: #92400e; }
    .status-done { background: #d1fae5; color: #065f46; }
    .c-content { background: white; border-radius: 8px; padding: 12px; font-size: 14px; color: #334155; line-height: 1.6; margin-bottom: 10px; }
    .c-bottom { display: flex; justify-content: space-between; align-items: center; }
    .c-time { font-size: 11px; color: var(--gray); }
    .c-delete { background: #fff5f5; border: 1px solid #fc8181; color: #c53030; padding: 5px 10px; border-radius: 6px; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
    .c-delete:hover { background: #c53030; color: white; }
    .c-loading { text-align: center; padding: 40px; color: var(--gray); font-size: 14px; }
  </style>
</head>
<body>
<div class="header">
  <div class="header-badge">관리자</div>
  <h1>AU 일학습병행 관리자</h1>
</div>

<div class="tab-nav">
  <button class="active" onclick="switchTab('push', this)">🔔 알림 발송</button>
  <button onclick="switchTab('notice', this)">📢 공지사항</button>
  <button onclick="switchTab('survey', this)">📋 만족도 조사</button>
  <button onclick="switchTab('consulting', this)">💬 상담신청</button>
</div>

<!-- 알림 발송 탭 -->
<div class="tab-content active" id="tab-push">
<div class="container">
  <div class="card">
    <div class="card-title">📢 알림 발송</div>
    <div class="form-group">
      <div class="form-label">발송 대상 선택</div>
      <div class="group-buttons">
        <button class="group-btn" onclick="selectGroup('P-TECH 1학년', this)"><span class="icon">🎓</span>P-TECH<br>1학년</button>
        <button class="group-btn" onclick="selectGroup('P-TECH 2학년', this)"><span class="icon">🎓</span>P-TECH<br>2학년</button>
        <button class="group-btn" onclick="selectGroup('전문대 마케팅경영학과', this)"><span class="icon">📚</span>마케팅<br>경영학과</button>
        <button class="group-btn" onclick="selectGroup('전문대 호텔조리학과', this)"><span class="icon">🍳</span>호텔<br>조리학과</button>
        <button class="group-btn" onclick="selectGroup('전문대 회계세무학과', this)"><span class="icon">📊</span>회계<br>세무학과</button>
        <button class="group-btn" onclick="selectGroup('전문대 호텔경영학과', this)"><span class="icon">🏨</span>호텔<br>경영학과</button>
        <button class="group-btn" style="grid-column: span 4;" onclick="selectGroup('전체', this)"><span class="icon">📣</span>전체 발송</button>
      </div>
      <div class="selected-group-display" id="selectedDisplay">대상을 선택해주세요</div>
    </div>
    <div class="form-group">
      <label class="form-label">알림 제목</label>
      <input type="text" class="form-input" id="title" placeholder="예: AU 일학습병행 공지" />
    </div>
    <div class="form-group">
      <label class="form-label">알림 내용</label>
      <textarea class="form-input" id="message" placeholder="예: 오늘 오후 3시 비콘 출결 잊지 마세요!"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendNotification()">🔔 알림 발송</button>
    <div class="result-box" id="resultBox"></div>
  </div>
  <div class="card">
    <div class="card-title">📋 발송 기록</div>
    <div id="historyList"><div class="empty-history">아직 발송 기록이 없어요</div></div>
  </div>
</div>
</div>

<!-- 공지사항 탭 -->
<div class="tab-content" id="tab-notice">
<div class="container">
  <div class="card">
    <div class="card-title">✏️ 공지사항 작성</div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input type="text" class="form-input" id="noticeTitle" placeholder="공지사항 제목을 입력해주세요" />
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <textarea class="form-input" id="noticeContent" style="min-height:200px;" placeholder="공지사항 내용을 입력해주세요"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">이미지 첨부 (선택)</label>
      <div class="file-upload" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none" onchange="previewImages(this)">
        <div>📷 클릭해서 이미지 선택</div>
        <div style="font-size:12px;color:#aaa;margin-top:4px;">여러 장 선택 가능</div>
      </div>
      <div class="preview-grid" id="imagePreview"></div>
      <div class="upload-progress" id="uploadProgress"></div>
    </div>
    <button class="send-btn" id="noticeBtn" onclick="postNotice()">📢 공지사항 등록</button>
    <div class="result-box" id="noticeResult"></div>
  </div>
  <div class="card">
    <div class="card-title">📋 등록된 공지사항</div>
    <div id="noticeList"><div class="empty-history">불러오는 중...</div></div>
  </div>
</div>
</div>

<!-- 만족도 조사 탭 -->
<div class="tab-content" id="tab-survey">
  <div class="container">
  <div class="card">
    <div class="card-title">📋 만족도 조사 개폐 관리</div>
    <div id="surveyStatusList">
      <div style="text-align:center;color:#a0aec0;padding:20px">불러오는 중...</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📊 응답 데이터 확인</div>
    <div style="padding:14px;background:#f7fafc;border-radius:10px;font-size:13px;color:#4a5568;line-height:1.8;margin-bottom:12px">
      응답 데이터는 구글 스프레드시트에서 확인하세요.<br>
      차수별 시트(초기_만족도, 1차_만족도 등)로 자동 분류됩니다.
    </div>
    <a href="https://docs.google.com/spreadsheets/d/1NLBmeoNzBjUMvCP6LQLX0fNHvBKUfoeHBOhTYMlDWJk/edit" target="_blank"
      class="send-btn" style="display:block;text-align:center;text-decoration:none;background:#1a56db;color:white;padding:14px;border-radius:12px;font-weight:700">
      📊 스프레드시트에서 응답 확인하기
    </a>
  </div>
  </div>
</div>

<!-- 상담신청 탭 -->
<div class="tab-content" id="tab-consulting">
  <div class="container">
    <div class="card">
      <div class="card-title">💬 상담 신청 내역</div>
      <div class="consulting-toolbar">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="count-badge" id="consultingCount">불러오는 중...</span>
          <select class="filter-select" id="consultingFilter" onchange="renderConsulting()">
            <option value="all">전체 보기</option>
            <option value="대기중">대기중만</option>
            <option value="완료">완료만</option>
          </select>
        </div>
        <button class="refresh-btn" onclick="loadConsulting()">🔄 새로고침</button>
      </div>
      <div id="consultingList">
        <div class="c-loading">📋 불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<script>
  const CLOUDINARY_CLOUD = 'dfu06qits';
  const CLOUDINARY_PRESET = 'au_notices';
  const APP_ID = "6bed6730-b167-48a8-a98d-83cdcb1cbc10";
  const WORKER_URL = "https://damp-leaf-0c5c.dks3275-rgb.workers.dev";

  let selectedGroup = null;
  let sendHistory = JSON.parse(localStorage.getItem('sendHistory') || '[]');
  let selectedFiles = [];
  let consultingItems = [];

  // ── 탭 전환 ──
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
    if (tab === 'survey') loadSurveyStatus();
    if (tab === 'consulting') loadConsulting();
  }

  // ── 알림 발송 ──
  function selectGroup(group, btn) {
    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedGroup = group;
    document.getElementById('selectedDisplay').innerHTML = '선택됨: <span>' + (group === '전체' ? '전체 학생' : group) + '</span>';
  }

  async function sendNotification() {
    const title = document.getElementById('title').value.trim();
    const message = document.getElementById('message').value.trim();
    const sendBtn = document.getElementById('sendBtn');
    if (!selectedGroup) { showResult('발송 대상을 선택해주세요!', 'error'); return; }
    if (!title) { showResult('알림 제목을 입력해주세요!', 'error'); return; }
    if (!message) { showResult('알림 내용을 입력해주세요!', 'error'); return; }
    sendBtn.disabled = true; sendBtn.textContent = '발송 중...';
    let body = { app_id: APP_ID, headings: { en: title, ko: title }, contents: { en: message, ko: message } };
    if (selectedGroup === '전체') { body.included_segments = ["Total Subscriptions"]; }
    else { body.filters = [{ field: "tag", key: "학년", relation: "=", value: selectedGroup }]; }
    try {
      const response = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      const data = await response.json();
      if (data.id) { showResult('✅ 발송 완료!', 'success'); addHistory(selectedGroup, title, message); document.getElementById('title').value = ''; document.getElementById('message').value = ''; }
      else { showResult('❌ 발송 실패: ' + JSON.stringify(data.errors || data), 'error'); }
    } catch(e) { showResult('❌ 오류: ' + e.message, 'error'); }
    sendBtn.disabled = false; sendBtn.textContent = '🔔 알림 발송';
  }

  function showResult(msg, type) {
    const box = document.getElementById('resultBox');
    box.textContent = msg; box.className = 'result-box ' + type;
    setTimeout(() => { box.className = 'result-box'; box.style.display = 'none'; }, 5000);
  }

  function addHistory(group, title, message) {
    const now = new Date().toLocaleString('ko-KR');
    sendHistory.unshift({ group, title, message, time: now });
    if (sendHistory.length > 20) sendHistory.pop();
    localStorage.setItem('sendHistory', JSON.stringify(sendHistory));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (sendHistory.length === 0) { list.innerHTML = '<div class="empty-history">아직 발송 기록이 없어요</div>'; return; }
    list.innerHTML = sendHistory.map(h => '<div class="history-item"><div class="time">' + h.time + '</div><span class="group-tag">' + (h.group === '전체' ? '전체' : h.group) + '</span><div style="font-weight:500;margin-top:4px;">' + h.title + '</div><div style="color:#4a5568;margin-top:2px;">' + h.message + '</div></div>').join('');
  }
  renderHistory();

  // ── 공지사항 ──
  function previewImages(input) {
    selectedFiles = Array.from(input.files);
    const preview = document.getElementById('imagePreview');
    preview.innerHTML = '';
    selectedFiles.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'preview-img';
        preview.appendChild(img);
      };
      reader.readAsDataURL(file);
    });
  }

  async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_PRESET);
    const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD + '/image/upload', { method: 'POST', body: formData });
    const data = await res.json();
    return data.secure_url;
  }

  async function postNotice() {
    const title = document.getElementById('noticeTitle').value.trim();
    const content = document.getElementById('noticeContent').value.trim();
    const btn = document.getElementById('noticeBtn');
    const progress = document.getElementById('uploadProgress');
    if (!title) { showNoticeResult('제목을 입력해주세요!', 'error'); return; }
    if (!content) { showNoticeResult('내용을 입력해주세요!', 'error'); return; }
    btn.disabled = true; btn.textContent = '등록 중...';
    try {
      let imageUrls = [];
      for (let i = 0; i < selectedFiles.length; i++) {
        progress.textContent = '이미지 업로드 중... (' + (i+1) + '/' + selectedFiles.length + ')';
        const url = await uploadToCloudinary(selectedFiles[i]);
        imageUrls.push(url);
      }
      progress.textContent = '';
      await window.addNoticeToFirestore({ title, content, images: imageUrls });
      showNoticeResult('✅ 공지사항이 등록됐어요!', 'success');
      if (confirm('📢 전체 학생에게 알림도 보낼까요?')) {
        const body = { app_id: APP_ID, headings: { en: title, ko: title }, contents: { en: '새 공지사항이 등록됐어요. 확인해주세요!', ko: '새 공지사항이 등록됐어요. 확인해주세요!' }, included_segments: ["Total Subscriptions"], url: "https://dks3275-rgb.github.io/notice.html" };
        await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      }
      document.getElementById('noticeTitle').value = '';
      document.getElementById('noticeContent').value = '';
      document.getElementById('imagePreview').innerHTML = '';
      selectedFiles = [];
      document.getElementById('imageInput').value = '';
    } catch(e) { showNoticeResult('❌ 오류: ' + e.message, 'error'); }
    btn.disabled = false; btn.textContent = '📢 공지사항 등록';
  }

  function showNoticeResult(msg, type) {
    const box = document.getElementById('noticeResult');
    box.textContent = msg; box.className = 'result-box ' + type;
    setTimeout(() => { box.className = 'result-box'; box.style.display = 'none'; }, 5000);
  }

  // ── 상담신청 내역 (Firebase) ──
  async function loadConsulting() {
    document.getElementById('consultingList').innerHTML = '<div class="c-loading">📋 불러오는 중...</div>';
    document.getElementById('consultingCount').textContent = '불러오는 중...';
    try {
      const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy } =
        await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

      const cfg = {
        apiKey: "AIzaSyD6r6R593RIfe8GCMjM3lgQgCcfiF0Rbuc",
        authDomain: "au-ilhaksub.firebaseapp.com",
        projectId: "au-ilhaksub",
        storageBucket: "au-ilhaksub.firebasestorage.app",
        messagingSenderId: "407960160823",
        appId: "1:407960160823:web:1e830d6b0d69e4a7b84db2"
      };
      const app = getApps().find(a => a.name === 'consulting') || initializeApp(cfg, 'consulting');
      const db = getFirestore(app);

      window._cDb = db;
      window._cDoc = doc;
      window._cUpdateDoc = updateDoc;
      window._cDeleteDoc = deleteDoc;
      window._cCollection = collection;

      let snapshot;
      try {
        const q = query(collection(db, 'consulting'), orderBy('createdAt', 'desc'));
        snapshot = await getDocs(q);
      } catch {
        snapshot = await getDocs(collection(db, 'consulting'));
      }

      consultingItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      consultingItems.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
      renderConsulting();
    } catch(e) {
      document.getElementById('consultingList').innerHTML =
        '<div class="empty-history">⚠️ 불러오기 실패: ' + e.message + '</div>';
    }
  }

  function renderConsulting() {
    const filter = document.getElementById('consultingFilter').value;
    const items = filter === 'all' ? consultingItems : consultingItems.filter(i => i.status === filter);
    const waiting = consultingItems.filter(i => i.status === '대기중').length;
    document.getElementById('consultingCount').textContent =
      `총 ${consultingItems.length}건 · 대기 ${waiting}건`;

    if (items.length === 0) {
      document.getElementById('consultingList').innerHTML =
        '<div class="empty-history">📭 상담 신청 내역이 없어요</div>';
      return;
    }

    document.getElementById('consultingList').innerHTML = items.map(item => `
      <div class="consulting-card ${item.status === '완료' ? 'done' : 'waiting'}" id="ccard-${item.id}">
        <div class="c-top">
          <div class="c-person">
            <div class="c-avatar">${(item.name || '?').charAt(0)}</div>
            <div>
              <div class="c-name">${item.name || '-'}</div>
              <div class="c-dept">${item.dept || '-'}</div>
            </div>
          </div>
          <button class="status-toggle ${item.status === '완료' ? 'status-done' : 'status-waiting'}"
            onclick="toggleConsultingStatus('${item.id}', '${item.status}')">
            ${item.status === '완료' ? '✅ 완료' : '⏳ 대기중'}
          </button>
        </div>
        <div class="c-content">${item.content || '-'}</div>
        <div class="c-bottom">
          <span class="c-time">📅 ${item.time || '-'}</span>
          <button class="c-delete" onclick="deleteConsulting('${item.id}')">🗑️ 삭제</button>
        </div>
      </div>
    `).join('');
  }

  async function toggleConsultingStatus(id, currentStatus) {
    const newStatus = currentStatus === '완료' ? '대기중' : '완료';
    try {
      await window._cUpdateDoc(window._cDoc(window._cDb, 'consulting', id), { status: newStatus });
      const idx = consultingItems.findIndex(i => i.id === id);
      if (idx !== -1) consultingItems[idx].status = newStatus;
      renderConsulting();
    } catch(e) { alert('상태 변경 실패: ' + e.message); }
  }

  async function deleteConsulting(id) {
    if (!confirm('이 상담 신청을 삭제할까요?')) return;
    try {
      await window._cDeleteDoc(window._cDoc(window._cDb, 'consulting', id));
      consultingItems = consultingItems.filter(i => i.id !== id);
      renderConsulting();
    } catch(e) { alert('삭제 실패: ' + e.message); }
  }

  // ── 만족도 조사 ──
  const SURVEY_LIST = [
    {id:'initial', name:'초기 만족도 조사', desc:'훈련 시작 1~2달'},
    {id:'round1',  name:'1차 만족도 조사', desc:'1학년 1학기 종료'},
    {id:'round2',  name:'2차 만족도 조사', desc:'1학년 2학기 종료'},
    {id:'round3',  name:'3차 만족도 조사', desc:'2학년 1학기 (P-TECH 전용)'},
    {id:'round4',  name:'4차 만족도 조사', desc:'2학년 2학기 (P-TECH 전용)'},
  ];

  async function loadSurveyStatus() {
    const list = document.getElementById('surveyStatusList');
    if (!list) return;
    try {
      const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const { getFirestore, getDoc, setDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const cfg = {
        apiKey:"AIzaSyD6r6R593RIfe8GCMjM3lgQgCcfiF0Rbuc",
        authDomain:"au-ilhaksub.firebaseapp.com",
        projectId:"au-ilhaksub",
        storageBucket:"au-ilhaksub.firebasestorage.app",
        messagingSenderId:"407960160823",
        appId:"1:407960160823:web:1e830d6b0d69e4a7b84db2"
      };
      const app = getApps().find(a=>a.name==='survey') || initializeApp(cfg,'survey');
      const db = getFirestore(app);
      const statuses = await Promise.all(SURVEY_LIST.map(s => getDoc(doc(db,'surveyConfig',s.id))));
      list.innerHTML = SURVEY_LIST.map((s,i) => {
        const isOpen = statuses[i].exists() ? statuses[i].data().open : false;
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f0f0f0">
          <div>
            <div style="font-weight:700;font-size:14px">${s.name}</div>
            <div style="font-size:12px;color:#718096;margin-top:2px">${s.desc}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:12px;font-weight:700;color:${isOpen?'#38a169':'#a0aec0'}">${isOpen?'● 진행중':'● 준비중'}</span>
            <button onclick="toggleSurvey('${s.id}',${!isOpen})"
              style="padding:8px 18px;border-radius:8px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:${isOpen?'#fff5f5':'#f0fff4'};color:${isOpen?'#c53030':'#276749'}">
              ${isOpen?'닫기':'열기'}
            </button>
          </div>
        </div>`;
      }).join('');
      window._surveyDb = db; window._surveyDoc = doc; window._surveySetDoc = setDoc;
    } catch(e) {
      list.innerHTML = '<div style="color:#e53e3e;padding:12px">오류: ' + e.message + '</div>';
    }
  }

  window.toggleSurvey = async function(id, open) {
    const s = SURVEY_LIST.find(s=>s.id===id);
    if (!confirm('"' + s.name + '"를 ' + (open?'열기':'닫기') + ' 할까요?')) return;
    try {
      await window._surveySetDoc(window._surveyDoc(window._surveyDb,'surveyConfig',id), {open, name:s.name});
      await loadSurveyStatus();
    } catch(e) { alert('오류: ' + e.message); }
  };
</script>
