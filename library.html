<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AU 자료실</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root { --navy: #0f2744; --blue: #1a4a8a; --accent: #e8a020; --light: #f0f4f8; --gray: #8a9ab5; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--light); min-height: 100vh; }
  .header { background: var(--navy); padding: 20px 24px; display: flex; align-items: center; gap: 12px; }
  .header-badge { background: var(--accent); color: var(--navy); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .header h1 { color: white; font-size: 18px; font-weight: 700; }
  .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
  .back-btn { display: none; align-items: center; gap: 8px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; padding: 10px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--navy); margin-bottom: 20px; transition: all 0.2s; }
  .back-btn:hover { border-color: var(--blue); }
  .back-btn.visible { display: flex; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
  .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .category-card { background: white; border-radius: 16px; padding: 24px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; text-align: center; }
  .category-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .category-icon { font-size: 36px; margin-bottom: 12px; }
  .category-name { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .category-count { font-size: 12px; color: var(--gray); }
  .file-list { display: flex; flex-direction: column; gap: 12px; }
  .resource-card { background: white; border-radius: 14px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); display: flex; align-items: center; gap: 16px; text-decoration: none; color: inherit; transition: all 0.2s; border: 2px solid transparent; }
  .resource-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .file-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .file-icon.pdf { background: #fff0f0; }
  .file-icon.image { background: #f0f7ff; }
  .file-icon.link { background: #f0fff4; }
  .file-icon.file { background: #fffbf0; }
  .card-info { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 700; color: #1a202c; margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: var(--gray); margin-bottom: 6px; }
  .card-date { font-size: 11px; color: #cbd5e0; }
  .card-arrow { color: var(--gray); font-size: 18px; flex-shrink: 0; }
  .empty { text-align: center; padding: 60px 20px; color: var(--gray); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-badge">자료실</div>
  <h1>AU 일학습병행 자료실</h1>
</div>
<div class="container">
  <button class="back-btn" id="backBtn" onclick="showCategories()">← 카테고리로 돌아가기</button>
  <div class="section-title" id="sectionTitle">카테고리 선택</div>
  <div class="category-grid" id="categoryGrid"></div>
  <div class="file-list" id="fileList" style="display:none;"></div>
</div>

<script>
const CATEGORIES = [
  { name: 'P-TECH 1학년', icon: '🎓' },
  { name: 'P-TECH 2학년', icon: '🎓' },
  { name: '전문대 마케팅경영학과', icon: '📚' },
  { name: '전문대 호텔조리학과', icon: '🍳' },
  { name: '전문대 회계세무학과', icon: '📊' },
  { name: '전문대 호텔경영학과', icon: '🏨' },
  { name: '공통', icon: '📢' },
];
const typeIcon = { pdf: '📄', image: '🖼️', link: '🔗', file: '📁' };
let allResources = [];

async function loadResources() {
  try {
    const res = await fetch('https://dks3275-rgb.github.io/resources.json?t=' + Date.now());
    allResources = await res.json();
    showCategories();
  } catch(e) {
    document.getElementById('categoryGrid').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>자료를 불러올 수 없어요</div></div>';
  }
}

function showCategories() {
  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('sectionTitle').textContent = '카테고리 선택';
  document.getElementById('fileList').style.display = 'none';
  document.getElementById('categoryGrid').style.display = 'grid';
  document.getElementById('categoryGrid').innerHTML = CATEGORIES.map(cat => {
    const count = allResources.filter(r => r.category === cat.name).length;
    return '<div class="category-card" onclick="showFiles(\'' + cat.name + '\')">' +
      '<div class="category-icon">' + cat.icon + '</div>' +
      '<div class="category-name">' + cat.name + '</div>' +
      '<div class="category-count">자료 ' + count + '개</div>' +
      '</div>';
  }).join('');
}

function showFiles(categoryName) {
  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('sectionTitle').textContent = categoryName;
  document.getElementById('categoryGrid').style.display = 'none';
  document.getElementById('fileList').style.display = 'flex';
  const filtered = allResources.filter(r => r.category === categoryName);
  const list = document.getElementById('fileList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div>등록된 자료가 없어요</div></div>';
    return;
  }
  list.innerHTML = filtered.map(r =>
    '<a class="resource-card" href="' + r.url + '" target="_blank" rel="noopener">' +
    '<div class="file-icon ' + r.type + '">' + (typeIcon[r.type] || '📁') + '</div>' +
    '<div class="card-info">' +
    '<div class="card-title">' + r.title + '</div>' +
    (r.desc ? '<div class="card-desc">' + r.desc + '</div>' : '') +
    '<div class="card-date">' + r.date + '</div>' +
    '</div>' +
    '<div class="card-arrow">›</div>' +
    '</a>'
  ).join('');
}

loadResources();
</script>
</body>
</html>
