<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>AU 일학습병행 만족도 조사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy:#0a1628;
    --card:#121f36;
    --card2:#1a2d4a;
    --accent:#e8a020;
    --accent2:#f0b830;
    --blue:#2e7dff;
    --blue2:#5b9fff;
    --green:#00c48c;
    --red:#ff4757;
    --text1:#ffffff;
    --text2:#94a3b8;
    --text3:#64748b;
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--navy);color:var(--text1);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:40px}

  /* 헤더 */
  .header{position:sticky;top:0;z-index:100;background:var(--navy);border-bottom:1px solid rgba(255,255,255,0.06);padding:14px 20px;display:flex;align-items:center;gap:12px}
  .back-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.06);border:none;color:var(--text1);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;display:none}
  .back-btn.visible{display:flex}
  .header-title{font-size:17px;font-weight:700;flex:1}

  /* 메인 */
  .main{padding:20px}

  /* 인트로 카드 */
  .intro-card{background:linear-gradient(135deg,rgba(46,125,255,0.15),rgba(232,160,32,0.1));border:1px solid rgba(46,125,255,0.2);border-radius:var(--radius);padding:24px 20px;margin-bottom:24px;text-align:center}
  .intro-icon{font-size:40px;margin-bottom:12px}
  .intro-title{font-size:18px;font-weight:700;margin-bottom:8px}
  .intro-desc{font-size:13px;color:var(--text2);line-height:1.7}

  /* 설문 카드 목록 */
  .survey-list{display:flex;flex-direction:column;gap:12px}
  .survey-card{background:var(--card);border-radius:14px;padding:18px 20px;border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px}
  .survey-card:active{transform:scale(.97);background:var(--card2)}
  .survey-card.closed{opacity:.5;cursor:default}
  .survey-card.completed{border-color:var(--green);background:rgba(0,196,140,0.06)}
  .survey-icon{font-size:26px;width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .survey-info{flex:1}
  .survey-name{font-size:15px;font-weight:700;margin-bottom:3px}
  .survey-desc{font-size:12px;color:var(--text2)}
  .survey-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
  .badge-open{background:rgba(0,196,140,0.15);color:var(--green)}
  .badge-closed{background:rgba(255,255,255,0.06);color:var(--text3)}
  .badge-done{background:rgba(0,196,140,0.2);color:var(--green)}

  /* 설문 폼 */
  .survey-form{display:none;flex-direction:column;gap:0}
  .survey-form.active{display:flex}

  .section-header{padding:20px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:4px}
  .section-title{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px}

  .question-block{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.04)}
  .q-label{font-size:14px;font-weight:600;line-height:1.6;margin-bottom:14px;color:var(--text1)}
  .q-num{color:var(--accent);font-weight:900;margin-right:4px}
  .q-required{color:var(--red);font-size:11px;margin-left:4px}

  /* 5점 척도 */
  .scale-wrap{display:flex;flex-direction:column;gap:8px}
  .scale-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);padding:0 2px;margin-bottom:4px}
  .scale-btns{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .scale-btn{padding:10px 4px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
  .scale-btn:active{transform:scale(.95)}
  .scale-btn.selected{background:var(--blue);border-color:var(--blue);color:#fff}
  .scale-btn[data-val="1"].selected{background:#ff4757;border-color:#ff4757}
  .scale-btn[data-val="2"].selected{background:#ff6b35;border-color:#ff6b35}
  .scale-btn[data-val="3"].selected{background:#ffa500;border-color:#ffa500}
  .scale-btn[data-val="4"].selected{background:#2e7dff;border-color:#2e7dff}
  .scale-btn[data-val="5"].selected{background:#00c48c;border-color:#00c48c}

  /* 다중선택 */
  .multi-wrap{display:flex;flex-direction:column;gap:8px}
  .multi-btn{padding:12px 16px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:10px}
  .multi-btn:active{transform:scale(.98)}
  .multi-btn.selected{background:rgba(46,125,255,0.12);border-color:var(--blue);color:var(--text1)}
  .multi-check{width:20px;height:20px;border-radius:6px;border:2px solid rgba(255,255,255,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
  .multi-btn.selected .multi-check{background:var(--blue);border-color:var(--blue)}

  /* 단일 선택 (라디오) */
  .radio-wrap{display:flex;flex-direction:column;gap:8px}
  .radio-btn{padding:12px 16px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:10px}
  .radio-btn.selected{background:rgba(46,125,255,0.12);border-color:var(--blue);color:var(--text1)}
  .radio-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .radio-btn.selected .radio-dot{border-color:var(--blue);background:var(--blue)}
  .radio-btn.selected .radio-dot::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}

  /* 서술형 */
  .text-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text1);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.6;resize:vertical;min-height:90px;outline:none;transition:border-color .2s}
  .text-input:focus{border-color:var(--blue)}
  .text-input::placeholder{color:var(--text3)}

  /* 정보 입력 */
  .info-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text1);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  .info-input:focus{border-color:var(--blue)}

  /* 진행률 */
  .progress-wrap{padding:16px 20px 0}
  .progress-bar-bg{height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:4px;transition:width .3s}
  .progress-text{font-size:11px;color:var(--text3);margin-top:6px;text-align:right}

  /* 제출 버튼 */
  .submit-wrap{padding:20px}
  .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
  .submit-btn:active{transform:scale(.97)}
  .submit-btn:disabled{background:var(--card2);color:var(--text3);cursor:default}

  /* 완료 화면 */
  .done-wrap{padding:60px 20px;text-align:center;display:none}
  .done-wrap.active{display:block}
  .done-icon{font-size:60px;margin-bottom:20px}
  .done-title{font-size:22px;font-weight:700;margin-bottom:10px}
  .done-desc{font-size:14px;color:var(--text2);line-height:1.7}

  /* 로딩 */
  .loading{display:none;position:fixed;inset:0;background:rgba(10,22,40,0.9);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  .loading.active{display:flex}
  .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:14px;color:var(--text2)}

  .fade-in{animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .error-msg{color:var(--red);font-size:12px;margin-top:6px;display:none}
  .error-msg.show{display:block}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
  <div class="header-title" id="headerTitle">만족도 조사</div>
</div>

<div id="mainView" class="main">
  <div class="intro-card fade-in">
    <div class="intro-icon">📋</div>
    <div class="intro-title">AU 일학습병행 만족도 조사</div>
    <div class="intro-desc">본 조사는 일학습병행 훈련의 질 향상을 위해 실시됩니다.<br>응답 내용은 익명으로 처리됩니다.</div>
  </div>
  <div class="survey-list" id="surveyList"></div>
</div>

<!-- 설문 폼 영역 -->
<div id="formView" style="display:none">
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0 / 0 완료</div>
  </div>
  <div id="formContent"></div>
  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" onclick="submitSurvey()">📤 제출하기</button>
  </div>
</div>

<div class="done-wrap" id="doneView">
  <div class="done-icon">✅</div>
  <div class="done-title">제출 완료!</div>
  <div class="done-desc">소중한 응답 감사합니다.<br>여러분의 의견이 훈련 개선에 큰 도움이 됩니다.</div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">제출 중입니다...</div>
</div>

<script>
// ============================================================
// 설정 - Google Apps Script URL (나중에 교체)
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0Prf0mhhwe5oHqbb6c0w5vyGHii8nLqSKrnUmFyqy9vEo87vxlhmVmNfkg6OvHrMB/exec';

// ============================================================
// 설문 구성
// ============================================================
const SURVEYS = [
  {
    id:'initial',
    name:'초기 만족도 조사',
    icon:'🌱',
    desc:'훈련 시작 1~2달 시점',
    forDepts:['ptech1','ptech2','marketing','cooking','accounting','hotel'],
    questions:'initial'
  },
  {
    id:'round1',
    name:'1차 만족도 조사',
    icon:'📝',
    desc:'1학년 1학기 종료 시점',
    forDepts:['ptech1','ptech2','marketing','cooking','accounting','hotel'],
    questions:'full'
  },
  {
    id:'round2',
    name:'2차 만족도 조사',
    icon:'📝',
    desc:'1학년 2학기 종료 시점 (전 학과)',
    forDepts:['ptech1','ptech2','marketing','cooking','accounting','hotel'],
    questions:'full'
  },
  {
    id:'round3',
    name:'3차 만족도 조사',
    icon:'📝',
    desc:'2학년 1학기 종료 시점 (P-TECH 전용)',
    forDepts:['ptech1','ptech2'],
    questions:'full'
  },
  {
    id:'round4',
    name:'4차 만족도 조사',
    icon:'📝',
    desc:'2학년 2학기 종료 시점 (P-TECH 전용)',
    forDepts:['ptech1','ptech2'],
    questions:'full'
  }
];

// ============================================================
// 문항 정의
// ============================================================
const QUESTIONS_INITIAL = [
  // 응답자 정보
  // 초기 적응
  {section:'초기 적응 현황'},
  {id:'i1', type:'scale', required:true, label:'일학습병행 프로그램에 대해 충분한 안내를 받았다.'},
  {id:'i2', type:'scale', required:true, label:'현장외훈련(Off-JT_학교수업)이 기대했던 것과 일치한다.'},
  {id:'i3', type:'scale', required:true, label:'현장훈련(OJT_회사훈련) 환경이 기대했던 것과 일치한다.'},
  {id:'i4', type:'scale', required:true, label:'일학습병행 참여 이후 업무와 학습을 병행하는 데 적응하고 있다.'},
  {id:'i4_1', type:'textarea', required:false, label:'위 문항에 대한 이유나 어려움이 있다면 구체적으로 작성해주세요.', placeholder:'자유롭게 작성해주세요.'},

  // OJT 초기
  {section:'현장훈련(OJT) 초기 현황'},
  {id:'i5', type:'radio', required:true, label:'현재 학습기업에서 현장교육훈련(OJT)을 받고 있나요?',
   options:['받고 있음','받고 있지 않음','모르겠음']},
  {id:'i6', type:'scale', required:true, label:'기업현장교사(OJT 담당자)로부터 체계적인 훈련을 받고 있다.'},
  {id:'i7', type:'radio', required:true, label:'OJT 출석 처리는 어떻게 하고 있나요?',
   options:['고용24 앱에서 입실/퇴실 처리','수기출석부에 서명','어떻게 하는지 모른다','OJT를 받지 않고 있다']},

  // 근로조건
  {section:'근로조건'},
  {id:'i8', type:'radio', required:true, label:'매월 정기적으로 급여를 받고 있나요?',
   options:['받고 있다','받고 있지 않다','아직 받은 적 없다(1개월 미도래)']},
  {id:'i9', type:'scale', required:true, label:'현재 근로조건(급여, 근무시간 등)이 사전에 안내받은 내용과 일치한다.'},

  // 건의사항
  {section:'건의사항'},
  {id:'i10', type:'textarea', required:false, label:'일학습병행 초기 단계에서 어려운 점이나 개선이 필요한 사항을 자유롭게 작성해주세요.', placeholder:'자유롭게 작성해주세요.'}
];

const QUESTIONS_FULL = [
  // 응답자 정보
  // Off-JT 만족도
  {section:'현장외훈련(Off-JT) 만족도'},
  {id:'q1', type:'scale', required:true, label:'문1. 현장외훈련(Off-JT_학교수업) 수업 교재는 이해하기 쉽게 잘 구성되어 있다.'},
  {id:'q2', type:'scale', required:true, label:'문2. 현장외훈련(Off-JT_학교수업) 강의 내용에 따라 기자재(실험·실습 등) 활용이 잘 되고 있다.'},
  {id:'q3', type:'scale', required:true, label:'문3. 공동훈련센터에서 실시하는 현장외훈련(Off-JT) 내용이 기업 내 직무역량 강화에 도움이 되었다.'},
  {id:'q4', type:'scale', required:true, label:'문4. 학교 과제물 부담으로 인해 직장업무에 지장을 받는다.'},
  {id:'q5', type:'scale', required:true, label:'문5. 평일에 받는 수업 시간대가 부담된다.'},
  {id:'q5_1', type:'textarea', required:false, label:'문5-1. 위 문항 답변에 대한 이유를 구체적으로 작성해주세요.', placeholder:'자유롭게 작성해주세요.'},

  // OJT 만족도
  {section:'현장훈련(OJT) 만족도'},
  {id:'q6', type:'scale', required:true, label:'문6. 현장훈련(OJT_회사훈련)이 본인의 직무 역량 강화에 도움이 되었다.'},
  {id:'q7', type:'scale', required:true, label:'문7. 현장훈련(OJT_회사훈련)으로 인해 현장외훈련(Off-JT)에 지장을 받는다.'},
  {id:'q7_1', type:'textarea', required:false, label:'문7-1. 위 문항 답변에 대한 이유를 구체적으로 작성해주세요.', placeholder:'자유롭게 작성해주세요.'},

  // 자가진단
  {section:'학습근로자 자가진단'},
  {id:'q8', type:'scale', required:true, label:'문8. 본인은 지각·조퇴·결석 없이 훈련에 참여하였다.'},
  {id:'q9', type:'scale', required:true, label:'문9. 본인은 훈련(실습·평가 등)에 적극적으로 참여하였다.'},
  {id:'q10', type:'scale', required:true, label:'문10. 본인은 복습 및 예습을 어느 정도 진행하였다.'},
  {id:'q11', type:'textarea', required:false, label:'문11. 위 8·9·10 문항에서 훈련에 적극적으로 참여하지 못한 이유가 있다면 구체적으로 작성해주세요.', placeholder:'자유롭게 작성해주세요.'},

  // 외부평가
  {section:'외부평가 관련'},
  {id:'q12', type:'scale', required:true, label:'문12. 외부평가에 응시할 의사가 있나요?'},
  {id:'q13', type:'multi', required:false, label:'문13. 외부평가 준비는 어떻게 하고 있나요? (복수 선택 가능)',
   options:['학습모듈','공개문제 (CQ-NET)','모의 시험지','유튜브','기타']},
  {id:'q14', type:'scale', required:true, label:'문14. 외부평가를 위한 스터디 진행 시 참여 의사가 있나요?'},

  // 학습도구
  {section:'학습도구 지원 만족도'},
  {id:'q15', type:'scale', required:true, label:'문15. 공동훈련센터에서 지원한 제공 방법(카카오톡)은 사용 시 편리하였다.'},
  {id:'q16', type:'scale', required:true, label:'문16. 공동훈련센터에서 제공한 학습도구는 훈련 시 활용적이었다.'},
  {id:'q17', type:'scale', required:true, label:'문17. 학습활동서 작성 시 제공하였던 학습도구의 내용은 도움이 되었다.'},
  {id:'q18', type:'scale', required:true, label:'문18. 내부평가 시 훈련에 사용되었던 교재는 평가에 도움이 되었다.'},
  {id:'q19', type:'scale', required:true, label:'문19. 외부평가 준비 시 제공받은 학습도구 활용이 만족스러웠다.'},
  {id:'q20', type:'textarea', required:false, label:'문20. 학습도구 지원과 관련하여 요구 또는 개선사항이 있다면 작성해주세요.', placeholder:'자유롭게 작성해주세요.'},

  // 건의사항
  {section:'건의사항'},
  {id:'q21', type:'textarea', required:false, label:'문21. 공동훈련센터에서 개선해야 할 사항이나 일학습병행 운영에 관한 건의사항을 말씀해 주세요.', placeholder:'자유롭게 작성해주세요.'}
];

// ============================================================
// 상태
// ============================================================
let currentSurvey = null;
let answers = {};
let surveyConfig = {};
let userDept = '';
let userName = '';

// ============================================================
// 초기화
// ============================================================
async function init() {
  // 앱 가입 시 저장된 이름+학과 자동 로드
  try {
    const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
    userName = userInfo.name || '';
    const grade = userInfo.grade || '';
    if(grade.includes('P-TECH 1')) userDept='ptech1';
    else if(grade.includes('P-TECH 2')) userDept='ptech2';
    else if(grade.includes('마케팅')) userDept='marketing';
    else if(grade.includes('호텔조리')) userDept='cooking';
    else if(grade.includes('회계')) userDept='accounting';
    else if(grade.includes('호텔경영')) userDept='hotel';
  } catch(e) {}

  // Firebase에서 설문 개폐 상태 불러오기
  try {
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getFirestore, getDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const firebaseConfig = {
      apiKey: "AIzaSyD6r6R593RIfe8GCMjM3lgQgCcfiF0Rbuc",
      authDomain: "au-ilhaksub.firebaseapp.com",
      projectId: "au-ilhaksub",
      storageBucket: "au-ilhaksub.firebasestorage.app",
      messagingSenderId: "407960160823",
      appId: "1:407960160823:web:1e830d6b0d69e4a7b84db2"
    };
    const app = initializeApp(firebaseConfig, 'survey-app');
    const db = getFirestore(app);
    const ids = ['initial','round1','round2','round3','round4'];
    const docs = await Promise.all(ids.map(id => getDoc(doc(db, 'surveyConfig', id))));
    docs.forEach((d, i) => {
      surveyConfig[ids[i]] = { open: d.exists() ? d.data().open : false };
    });
  } catch(e) {
    surveyConfig = {};
  }

  renderSurveyList();
}

// ============================================================
// 설문 목록 렌더링
// ============================================================
function renderSurveyList() {
  const el = document.getElementById('surveyList');
  let h = '';

  SURVEYS.forEach((s,i) => {
    // 학과 필터
    if(userDept && !s.forDepts.includes(userDept)) return;

    const cfg = surveyConfig[s.id] || {};
    const isOpen = cfg.open === true;
    const isDone = localStorage.getItem('done_'+s.id) === 'true';

    let badgeHtml = '';
    let cardClass = 'survey-card fade-in';
    let clickAttr = '';

    if(isDone) {
      badgeHtml = '<span class="survey-badge badge-done">✓ 완료</span>';
      cardClass += ' completed';
    } else if(isOpen) {
      badgeHtml = '<span class="survey-badge badge-open">● 진행중</span>';
      clickAttr = `onclick="openSurvey('${s.id}')"`;
    } else {
      badgeHtml = '<span class="survey-badge badge-closed">준비중</span>';
      cardClass += ' closed';
    }

    h += `<div class="${cardClass}" style="animation-delay:${i*0.05}s" ${clickAttr}>
      <div class="survey-icon">${s.icon}</div>
      <div class="survey-info">
        <div class="survey-name">${s.name}</div>
        <div class="survey-desc">${s.desc}</div>
      </div>
      ${badgeHtml}
    </div>`;
  });

  el.innerHTML = h;
}

// ============================================================
// 설문 열기
// ============================================================
function openSurvey(id) {
  currentSurvey = SURVEYS.find(s=>s.id===id);
  if(!currentSurvey) return;
  answers = {};

  document.getElementById('mainView').style.display='none';
  document.getElementById('formView').style.display='block';
  document.getElementById('headerTitle').textContent = currentSurvey.name;
  document.getElementById('backBtn').classList.add('visible');

  const qs = currentSurvey.questions === 'initial' ? QUESTIONS_INITIAL : QUESTIONS_FULL;
  renderForm(qs);
}

// ============================================================
// 폼 렌더링
// ============================================================
function renderForm(qs) {
  let h = '';
  qs.forEach((q,i) => {
    if(q.section) {
      h += `<div class="section-header"><div class="section-title">📌 ${q.section}</div></div>`;
      return;
    }

    const reqMark = q.required ? '<span class="q-required">*필수</span>' : '';
    h += `<div class="question-block fade-in">
      <div class="q-label">${q.label}${reqMark}</div>`;

    if(q.type==='scale') {
      h += `<div class="scale-wrap">
        <div class="scale-labels"><span>① 매우 그렇다</span><span>⑤ 전혀 그렇지 않다</span></div>
        <div class="scale-btns">`;
      ['매우\n그렇다','그렇다','보통\n이다','그렇지\n않다','전혀\n그렇지\n않다'].forEach((label,idx) => {
        h += `<button class="scale-btn" data-val="${idx+1}" onclick="selectScale('${q.id}',${idx+1},this)">${idx+1}<br><span style="font-size:9px;font-weight:400;color:inherit;opacity:.7;white-space:pre">${label}</span></button>`;
      });
      h += `</div></div>`;
    }
    else if(q.type==='multi') {
      h += `<div class="multi-wrap">`;
      q.options.forEach((opt,idx) => {
        h += `<button class="multi-btn" onclick="toggleMulti('${q.id}',${idx},this)">
          <div class="multi-check"></div>${opt}</button>`;
      });
      h += `</div>`;
    }
    else if(q.type==='radio') {
      h += `<div class="radio-wrap">`;
      q.options.forEach((opt,idx) => {
        h += `<button class="radio-btn" onclick="selectRadio('${q.id}','${opt}',this)">
          <div class="radio-dot"></div>${opt}</button>`;
      });
      h += `</div>`;
    }
    else if(q.type==='textarea') {
      h += `<textarea class="text-input" placeholder="${q.placeholder||''}" onchange="answers['${q.id}']=this.value" oninput="updateProgress()"></textarea>`;
    }
    else if(q.type==='text_short') {
      h += `<input type="text" class="info-input" placeholder="${q.placeholder||''}" onchange="answers['${q.id}']=this.value"/>`;
    }

    h += `</div>`;
  });

  document.getElementById('formContent').innerHTML = h;
  updateProgress();
}

// ============================================================
// 답변 처리
// ============================================================
function selectScale(qid, val, btn) {
  answers[qid] = val;
  btn.closest('.scale-btns').querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  updateProgress();
}

function toggleMulti(qid, idx, btn) {
  if(!answers[qid]) answers[qid]=[];
  const arr = answers[qid];
  if(arr.includes(idx)) {
    answers[qid] = arr.filter(v=>v!==idx);
    btn.classList.remove('selected');
    btn.querySelector('.multi-check').textContent='';
  } else {
    answers[qid].push(idx);
    btn.classList.add('selected');
    btn.querySelector('.multi-check').textContent='✓';
  }
  updateProgress();
}

function selectRadio(qid, val, btn) {
  answers[qid] = val;
  btn.closest('.radio-wrap').querySelectorAll('.radio-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  updateProgress();
}

// ============================================================
// 진행률
// ============================================================
function updateProgress() {
  const qs = currentSurvey?.questions === 'initial' ? QUESTIONS_INITIAL : QUESTIONS_FULL;
  const required = qs.filter(q=>q.required);
  const done = required.filter(q=>answers[q.id]!==undefined && answers[q.id]!=='').length;
  const pct = required.length ? Math.round(done/required.length*100) : 0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${done} / ${required.length} 완료`;
}

// ============================================================
// 제출
// ============================================================
async function submitSurvey() {
  const qs = currentSurvey.questions === 'initial' ? QUESTIONS_INITIAL : QUESTIONS_FULL;
  const required = qs.filter(q=>q.required);
  const missing = required.filter(q=>answers[q.id]===undefined || answers[q.id]==='');

  if(missing.length > 0) {
    alert(`필수 문항 ${missing.length}개에 응답해주세요.`);
    return;
  }

  document.getElementById('loading').classList.add('active');

  // 가입 정보 백그라운드 자동 포함 (학생에게 미표시)
  const deptLabel = {
    ptech1:'호텔식음료서비스_L3 (P-TECH 1학년)',
    ptech2:'호텔식음료서비스_L3 (P-TECH 2학년)',
    marketing:'총무인사_L3 (마케팅경영학과)',
    cooking:'양식조리_L4 (호텔조리학과)',
    accounting:'세무회계정보관리_L3 (회계세무학과)',
    hotel:'식음료서비스_L3 (호텔경영학과)'
  }[userDept] || '(미등록)';

  const payload = {
    surveyId: currentSurvey.id,
    surveyName: currentSurvey.name,
    timestamp: new Date().toLocaleString('ko-KR'),
    name: userName || '(미등록)',
    dept: deptLabel,
    ...answers
  };

  // 다중선택 항목 텍스트 변환
  const multiQs = qs.filter(q=>q.type==='multi');
  multiQs.forEach(q=>{
    if(answers[q.id]) {
      payload[q.id] = answers[q.id].map(idx=>q.options[idx]).join(', ');
    }
  });

  try {
    if(SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL') {
      // 개발 모드: 로컬 저장
      const saved = JSON.parse(localStorage.getItem('survey_responses')||'[]');
      saved.push(payload);
      localStorage.setItem('survey_responses', JSON.stringify(saved));
      await new Promise(r=>setTimeout(r,1000));
    } else {
      // no-cors 모드: Content-Type을 text/plain으로 전송
      const form = new FormData();
      form.append('payload', JSON.stringify(payload));
      await fetch(SCRIPT_URL, {
        method:'POST',
        mode:'no-cors',
        body: form
      });
    }
    localStorage.setItem('done_'+currentSurvey.id, 'true');
    document.getElementById('loading').classList.remove('active');
    document.getElementById('formView').style.display='none';
    document.getElementById('doneView').classList.add('active');
    document.getElementById('headerTitle').textContent='제출 완료';
    document.getElementById('backBtn').classList.remove('visible');
  } catch(e) {
    document.getElementById('loading').classList.remove('active');
    alert('제출 중 오류가 발생했습니다. 다시 시도해주세요.');
  }
}

// ============================================================
// 뒤로가기
// ============================================================
function goBack() {
  document.getElementById('formView').style.display='none';
  document.getElementById('mainView').style.display='block';
  document.getElementById('headerTitle').textContent='만족도 조사';
  document.getElementById('backBtn').classList.remove('visible');
  currentSurvey = null;
  answers = {};
}

// ============================================================
// 시작
// ============================================================
init();
</script>
</body>
</html>
