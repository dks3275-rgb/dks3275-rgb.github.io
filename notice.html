<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AU 공지사항</title>
<script src="device-check.js" data-auto-block></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root { --navy: #1976d2; --blue: #2196f3; --accent: #e8a020; --light: #f0f4f8; --gray: #8a9ab5; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--light); min-height: 100vh; }
  .header { background: var(--blue); padding: 20px 24px; display: flex; align-items: center; gap: 12px; }
  .header-badge { background: var(--accent); color: white; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .header h1 { color: white; font-size: 18px; font-weight: 700; }
  .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
  .notice-list { display: flex; flex-direction: column; gap: 12px; }
  .notice-card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(33,150,243,0.08); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
  .notice-card:hover { border-color: var(--blue); transform: translateY(-2px); }
  .notice-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .notice-badge { background: var(--blue); color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .notice-date { font-size: 11px; color: var(--gray); margin-left: auto; }
  .notice-title { font-size: 16px; font-weight: 700; color: #1a202c; margin-bottom: 6px; }
  .notice-preview { font-size: 13px; color: var(--gray); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .notice-detail { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
  .notice-detail.open { display: block; }
  .notice-content { font-size: 14px; line-height: 1.8; color: #2d3748; white-space: pre-wrap; }
  .notice-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 16px; }
  .notice-images img { width: 100%; border-radius: 10px; cursor: pointer; }
  .notice-files { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .notice-file { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--light); border-radius: 10px; text-decoration: none; color: var(--blue); font-size: 13px; font-weight: 500; }
  .empty { text-align: center; padding: 60px 20px; color: var(--gray); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px; color: var(--gray); }
</style>
</head>
<body>
<div class="header">
  <div class="header-badge">공지사항</div>
  <h1>AU 일학습병행 공지사항</h1>
</div>
<div class="container">
  <div class="notice-list" id="noticeList">
    <div class="loading">공지사항을 불러오는 중...</div>
  </div>
</div>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  const firebaseConfig = { apiKey:"AIzaSyD6r6R593RIfe8GCMjM3lgQgCcfiF0Rbuc", authDomain:"au-ilhaksub.firebaseapp.com", projectId:"au-ilhaksub", storageBucket:"au-ilhaksub.firebasestorage.app", messagingSenderId:"407960160823", appId:"1:407960160823:web:1e830d6b0d69e4a7b84db2" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  // 사용자 카테고리 확인 (재학생=student, 전담인력=company, 기타=all)
  const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
  const userCategory = userInfo.category || 'all';

  async function loadNotices() {
    const list = document.getElementById('noticeList');
    try {
      const q = query(collection(db, 'notices'), orderBy('createdAt', 'desc'));
      const snapshot = await getDocs(q);
      if (snapshot.empty) { list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>등록된 공지사항이 없어요</div></div>'; return; }

      // 카테고리에 맞는 공지만 필터링
      // - target이 없거나 'all'이면 모두에게 표시
      // - target이 'student'이면 재학생 + 졸업생에게 표시
      // - target이 'company'이면 전담인력에게만 표시
      const allDocs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      const filtered = allDocs.filter(d => {
        const t = d.target || 'all';
        if (t === 'all') return true;
        if (t === 'student') return ['student', 'graduate'].includes(userCategory);
        if (t === 'company') return userCategory === 'company';
        return true;
      });

      if (filtered.length === 0) { list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>등록된 공지사항이 없어요</div></div>'; return; }
      list.innerHTML = '';
      filtered.forEach(d => {
        const date = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleDateString('ko-KR') : '';
        const targetBadge = d.target === 'company' ? '<span style="font-size:10px;background:#ede9fe;color:#5b21b6;padding:2px 6px;border-radius:5px;margin-left:4px;font-weight:700;">전담인력</span>'
          : d.target === 'student' ? '<span style="font-size:10px;background:#e3f2fd;color:#1565c0;padding:2px 6px;border-radius:5px;margin-left:4px;font-weight:700;">재학생</span>' : '';
        const card = document.createElement('div');
        card.className = 'notice-card';
        card.innerHTML = `<div class="notice-top"><span class="notice-badge">공지</span>${targetBadge}<span class="notice-date">${date}</span></div><div class="notice-title">${d.title}</div><div class="notice-preview">${d.content}</div><div class="notice-detail" id="detail-${d.id}"><div class="notice-content">${d.content}</div>${d.images && d.images.length > 0 ? `<div class="notice-images">${d.images.map(url => `<img src="${url}" onclick="window.open('${url}')">`).join('')}</div>` : ''}${d.files && d.files.length > 0 ? `<div class="notice-files">${d.files.map(f => `<a class="notice-file" href="${f.url}" target="_blank">📎 ${f.name}</a>`).join('')}</div>` : ''}</div>`;
        card.onclick = () => { document.getElementById('detail-' + d.id).classList.toggle('open'); };
        list.appendChild(card);
      });
    } catch(e) { list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>공지사항을 불러올 수 없어요</div></div>'; }
  }
  loadNotices();
</script>
</body>
</html>
