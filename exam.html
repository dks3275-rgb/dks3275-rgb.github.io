<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>외부평가 | AU 일학습병행</title>
<meta name="theme-color" content="#2196f3"/>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#f4f6fb; --card:#fff; --border:#e4eaf4;
  --blue:#2196f3; --navy:#1976d2;
  --text:#1a2a3a; --text2:#5a7090; --text3:#8a9ab5;
  --green:#27ae60; --red:#e74c3c; --yellow:#f39c12; --purple:#8e44ad;
  --shadow:0 2px 12px rgba(33,150,243,0.08);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* 헤더 */
.header{background:var(--blue);padding:16px 20px 0}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back-btn{background:rgba(255,255,255,0.2);border:none;color:white;width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.header-badge{background:rgba(255,255,255,0.2);color:white;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
.header h1{color:white;font-size:20px;font-weight:900}
.view-tabs{display:flex}
.view-tab{flex:1;padding:11px;border:none;background:none;color:rgba(255,255,255,0.6);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s}
.view-tab.active{color:white;border-bottom-color:white;font-weight:700}

/* 메인 */
.main-pad{padding:20px 16px;max-width:600px;margin:0 auto}

/* 학과 선택 카드 */
.dept-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;border:1.5px solid var(--border);transition:all 0.2s;box-shadow:var(--shadow);margin-bottom:10px}
.dept-card:hover{border-color:var(--blue);transform:translateY(-1px)}
.dept-icon{font-size:24px;width:44px;height:44px;border-radius:12px;background:#e3f2fd;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dept-name{font-size:15px;font-weight:700;color:var(--text);flex:1}
.dept-arrow{color:var(--text3);font-size:18px}

/* 메뉴 카드 */
.menu-card{background:var(--card);border-radius:var(--radius);padding:20px 18px;display:flex;align-items:center;gap:16px;cursor:pointer;border:1.5px solid var(--border);transition:all 0.2s;box-shadow:var(--shadow);margin-bottom:12px;position:relative;overflow:hidden}
.menu-card::after{content:'';position:absolute;top:0;right:0;bottom:0;width:4px;border-radius:0 var(--radius) var(--radius) 0}
.menu-card.written::after{background:var(--blue)}
.menu-card.interview::after{background:var(--purple)}
.menu-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(33,150,243,0.13)}
.menu-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.menu-card.written .menu-icon{background:#e3f2fd}
.menu-card.interview .menu-icon{background:#f3e8ff}
.menu-info h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.menu-info p{font-size:12px;color:var(--text2);line-height:1.4}
.menu-arrow{color:var(--text3);font-size:20px;margin-left:auto}

/* 난이도 선택 */
.section-label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-left:2px}
.level-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.level-btn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow)}
.level-btn:hover{transform:translateY(-2px)}
.level-btn.lv1:hover,.level-btn.lv1.selected{border-color:var(--green);background:#e8f5e9}
.level-btn.lv2:hover,.level-btn.lv2.selected{border-color:var(--yellow);background:#fffbeb}
.level-btn.lv3:hover,.level-btn.lv3.selected{border-color:var(--red);background:#fdecea}
.level-num{font-size:22px;font-weight:900;margin-bottom:4px}
.lv1 .level-num{color:var(--green)}
.lv2 .level-num{color:var(--yellow)}
.lv3 .level-num{color:var(--red)}
.level-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.level-desc{font-size:10px;color:var(--text2);line-height:1.3}

/* 문항수 선택 */
.count-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.count-btn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow)}
.count-btn:hover{border-color:var(--blue);transform:translateY(-1px)}
.count-btn.selected{border-color:var(--blue);background:#e3f2fd}
.count-num{font-size:26px;font-weight:900;color:var(--blue);display:block;margin-bottom:2px}
.count-label{font-size:11px;color:var(--text2)}

/* 시작 버튼 */
.start-btn{width:100%;padding:16px;background:var(--blue);color:white;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(33,150,243,0.3)}
.start-btn:hover{background:var(--navy);transform:translateY(-1px)}
.start-btn:disabled{background:var(--border);color:var(--text3);cursor:default;box-shadow:none;transform:none}

/* 로딩 */
.generating{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.gen-spinner{width:56px;height:56px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--blue);animation:spin 1s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}
.gen-sub{font-size:13px;color:var(--text2);line-height:1.5}
.gen-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* 지필 시험 화면 */
.quiz-wrap{padding:16px;max-width:600px;margin:0 auto}
.progress-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.progress-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),#64b5f6);border-radius:3px;transition:width 0.4s ease}
.progress-text{font-size:12px;color:var(--text2);white-space:nowrap}
.q-card{background:var(--card);border-radius:var(--radius);padding:22px 20px;margin-bottom:14px;border:1.5px solid var(--border);box-shadow:var(--shadow)}
.q-type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#e3f2fd;color:var(--blue);display:inline-block;margin-bottom:8px}
.q-num{font-size:11px;color:var(--blue);font-weight:700;margin-bottom:6px}
.q-text{font-size:15px;font-weight:500;line-height:1.7;color:var(--text);word-break:keep-all}
.q-sub{font-size:13px;color:var(--text2);margin-top:8px;padding:10px;background:var(--bg);border-radius:8px;line-height:1.6}

/* 객관식 보기 */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.opt-btn{width:100%;text-align:left;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:14px;cursor:pointer;transition:all 0.2s;display:flex;align-items:flex-start;gap:12px;line-height:1.5;word-break:keep-all;font-family:'Noto Sans KR',sans-serif}
.opt-num{width:26px;height:26px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0;border:1.5px solid var(--border);transition:all 0.2s}
.opt-btn.selected{border-color:var(--blue);background:#e3f2fd}
.opt-btn.selected .opt-num{background:var(--blue);color:white;border-color:var(--blue)}
.opt-btn.correct{border-color:var(--green)!important;background:#e8f5e9!important}
.opt-btn.correct .opt-num{background:var(--green)!important;color:white!important;border-color:var(--green)!important}
.opt-btn.wrong{border-color:var(--red)!important;background:#fdecea!important}
.opt-btn.wrong .opt-num{background:var(--red)!important;color:white!important;border-color:var(--red)!important}
.opt-btn.disabled{pointer-events:none}

/* 주관식/계산형 입력 */
.subj-input{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:100px;transition:border-color 0.2s;margin-bottom:10px}
.subj-input:focus{border-color:var(--blue);background:white}
.subj-input::placeholder{color:var(--text3)}

/* 해설 */
.explanation{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13px;line-height:1.6;color:var(--text)}
.explanation strong{color:var(--yellow);font-weight:700}

/* 네비 버튼 */
.nav-btns{display:flex;gap:10px;margin-top:auto;padding-top:8px}
.nav-btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif}
.btn-confirm{background:var(--blue);color:white}
.btn-confirm:disabled{background:var(--border);color:var(--text3);cursor:default}
.btn-next{background:var(--blue);color:white}
.btn-submit{background:linear-gradient(135deg,#e74c3c,#c0392b);color:white}

/* 결과 */
.result-wrap{padding:20px 16px;max-width:600px;margin:0 auto;display:flex;flex-direction:column;align-items:center}
.result-circle{width:150px;height:150px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:16px 0 20px;position:relative}
.result-circle::before{content:'';position:absolute;inset:0;border-radius:50%;border:6px solid var(--border)}
.result-circle.pass{background:radial-gradient(circle,rgba(39,174,96,0.12) 0%,transparent 70%)}
.result-circle.pass::before{border-color:var(--green)}
.result-circle.fail{background:radial-gradient(circle,rgba(231,76,60,0.12) 0%,transparent 70%)}
.result-circle.fail::before{border-color:var(--red)}
.result-score{font-size:46px;font-weight:900;color:var(--text)}
.result-label{font-size:12px;color:var(--text2)}
.result-pass{font-size:16px;font-weight:700;margin-bottom:16px}
.result-pass.pass{color:var(--green)}
.result-pass.fail{color:var(--red)}
.stat-row{width:100%;display:flex;gap:10px;margin-bottom:20px}
.stat-box{flex:1;background:var(--card);border-radius:12px;padding:14px;text-align:center;border:1.5px solid var(--border)}
.stat-num{font-size:22px;font-weight:900;color:var(--text)}
.stat-num.c{color:var(--green)}
.stat-num.w{color:var(--red)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.review-title{width:100%;font-size:14px;font-weight:700;color:var(--blue);margin:10px 0 10px;text-align:left}
.review-card{width:100%;background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border)}
.review-q{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.5}
.review-ans{font-size:12px;margin-bottom:3px}
.review-ans.my{color:var(--red)}
.review-ans.right{color:var(--green)}
.review-exp{font-size:12px;color:var(--text2);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);line-height:1.5}
.result-btns{width:100%;display:flex;gap:10px;margin-top:16px}
.btn-retry{background:var(--bg);color:var(--text);border:1.5px solid var(--border);flex:1;padding:14px;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-home{background:var(--blue);color:white;flex:1;padding:14px;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none}

/* 면접 시험 화면 */
.interview-wrap{padding:16px;max-width:600px;margin:0 auto}
.interview-header{background:linear-gradient(135deg,#8e44ad,#6c3483);border-radius:var(--radius);padding:20px;margin-bottom:16px;color:white}
.interview-step{font-size:11px;font-weight:700;opacity:0.7;margin-bottom:4px}
.interview-unit{font-size:16px;font-weight:700}
.q-interview-card{background:var(--card);border-radius:var(--radius);padding:22px 20px;margin-bottom:14px;border:1.5px solid var(--border);box-shadow:var(--shadow)}
.interview-q-label{font-size:11px;font-weight:700;color:var(--purple);background:#f3e8ff;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:10px}
.interview-q-text{font-size:15px;font-weight:600;color:var(--text);line-height:1.7;word-break:keep-all}
.answer-textarea{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:140px;transition:border-color 0.2s;margin-bottom:12px}
.answer-textarea:focus{border-color:var(--purple);background:white}
.answer-textarea::placeholder{color:var(--text3)}
.submit-answer-btn{width:100%;padding:14px;background:var(--purple);color:white;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.submit-answer-btn:disabled{background:var(--border);color:var(--text3);cursor:default}

/* AI 피드백 카드 */
.feedback-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1.5px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px}
.feedback-score-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.feedback-score-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:white;flex-shrink:0}
.feedback-score-info{flex:1}
.feedback-score-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.feedback-score-val{font-size:22px;font-weight:900;color:var(--text)}
.feedback-section{margin-bottom:12px}
.feedback-section-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:0.5px}
.feedback-text{font-size:13px;color:var(--text);line-height:1.7;background:var(--bg);border-radius:8px;padding:12px}
.feedback-strong{color:var(--green);font-weight:700}
.feedback-weak{color:var(--red);font-weight:700}
.next-q-btn{width:100%;padding:14px;background:var(--purple);color:white;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}

/* 면접 결과 */
.interview-result{padding:20px 16px;max-width:600px;margin:0 auto}
.interview-score-summary{background:linear-gradient(135deg,#8e44ad,#6c3483);border-radius:var(--radius);padding:24px;color:white;text-align:center;margin-bottom:20px}
.int-score-big{font-size:52px;font-weight:900;margin:8px 0 4px}
.int-score-sub{font-size:13px;opacity:0.8}
.int-result-label{font-size:16px;font-weight:700;margin-top:8px}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.error-box{text-align:center;padding:40px 20px}
.error-icon{font-size:48px;margin-bottom:16px}
.error-msg{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.error-retry{padding:14px 32px;border-radius:12px;border:none;background:var(--blue);color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn 0.35s ease both}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <a href="index.html" class="back-btn">←</a>
    <span class="header-badge">외부평가</span>
    <h1 id="headerTitle">모의시험</h1>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" id="tab-written" onclick="switchMainTab('written')">📝 지필평가</button>
    <button class="view-tab" id="tab-interview" onclick="switchMainTab('interview')">🎤 면접평가</button>
  </div>
</div>

<!-- 지필평가 섹션 -->
<div id="section-written">
  <!-- 학과 선택 -->
  <div id="w-dept" class="main-pad">
    <div class="section-label">학과를 선택하세요</div>
  </div>
  <!-- 난이도/문항수 선택 -->
  <div id="w-config" class="main-pad" style="display:none">
    <div class="section-label" style="margin-bottom:8px">난이도 선택</div>
    <div class="level-grid">
      <div class="level-btn lv1" onclick="selectLevel(1,this)">
        <div class="level-num">LV1</div>
        <div class="level-name">기초</div>
        <div class="level-desc">진위형·선다형<br>쉬운 문제 위주</div>
      </div>
      <div class="level-btn lv2" onclick="selectLevel(2,this)">
        <div class="level-num">LV2</div>
        <div class="level-name">심화</div>
        <div class="level-desc">선다형·단답형<br>보통 난이도</div>
      </div>
      <div class="level-btn lv3" onclick="selectLevel(3,this)">
        <div class="level-num">LV3</div>
        <div class="level-name">고급</div>
        <div class="level-desc">계산형·논술형<br>어려운 문제</div>
      </div>
    </div>
    <div class="section-label">문항 수 선택</div>
    <div class="count-grid">
      <div class="count-btn" onclick="selectCount(5,this)"><span class="count-num">5</span><span class="count-label">빠른 테스트</span></div>
      <div class="count-btn" onclick="selectCount(10,this)"><span class="count-num">10</span><span class="count-label">기본 시험</span></div>
      <div class="count-btn" onclick="selectCount(15,this)"><span class="count-num">15</span><span class="count-label">심화 시험</span></div>
      <div class="count-btn" onclick="selectCount(20,this)"><span class="count-num">20</span><span class="count-label">모의평가</span></div>
    </div>
    <button class="start-btn" id="w-start-btn" onclick="startWrittenQuiz()" disabled>📝 시험 시작</button>
  </div>
  <!-- 로딩 -->
  <div id="w-loading" style="display:none">
    <div class="generating">
      <div class="gen-spinner"></div>
      <div class="gen-title">AI가 문제를 만들고 있어요<span class="gen-dots"></span></div>
      <div class="gen-sub" id="w-loading-sub"></div>
    </div>
  </div>
  <!-- 퀴즈 -->
  <div id="w-quiz" style="display:none"></div>
  <!-- 결과 -->
  <div id="w-result" style="display:none"></div>
</div>

<!-- 면접평가 섹션 -->
<div id="section-interview" style="display:none">
  <!-- 학과 선택 -->
  <div id="i-dept" class="main-pad">
    <div class="section-label">학과를 선택하세요</div>
  </div>
  <!-- 능력단위 선택 -->
  <div id="i-unit" class="main-pad" style="display:none">
    <div class="section-label">면접 능력단위 선택</div>
  </div>
  <!-- 로딩 -->
  <div id="i-loading" style="display:none">
    <div class="generating">
      <div class="gen-spinner" style="border-top-color:var(--purple)"></div>
      <div class="gen-title">AI가 면접 질문을 준비하고 있어요<span class="gen-dots"></span></div>
      <div class="gen-sub">실제 외부평가 기준으로 질문을 생성합니다</div>
    </div>
  </div>
  <!-- 면접 진행 -->
  <div id="i-quiz" style="display:none"></div>
  <!-- 면접 결과 -->
  <div id="i-result" style="display:none"></div>
</div>

<script>
const PROXY_URL = 'https://damp-leaf-0c5c.dks3275.workers.dev';
const BASE_URL = 'https://dks3275-rgb.github.io';

  document.getElementById('w-config').style.display = 'block';

}

  btn.classList.add('selected');

}
function checkStartReady() {
  document.getElementById('w-start-btn').disabled = !(selectedLevel && selectedCount);
}

async function startWrittenQuiz() {
  document.getElementById('w-config').style.display = 'none';
  document.getElementById('w-loading').style.display = 'block';
  document.getElementById('w-loading-sub').textContent = `LV${selectedLevel} 난이도 · ${selectedCount}문항 생성 중...`;

  const levelDesc = {
    1: '난이도: 쉬움. 진위형(O/X)과 4지선다 선다형 문제만 출제하세요. 기본 개념과 정의를 묻는 문제 위주.',
    2: '난이도: 보통. 4지선다 선다형과 단답형 문제를 혼합하여 출제하세요. 개념 적용과 상황 판단 문제 포함.',
    3: '난이도: 어려움. 계산형, 논술형, 복합 상황 문제를 포함하세요. 수식 계산이나 사례 분석이 필요한 고난도 문제.'
  }[selectedLevel];

  const sys = `당신은 한국 일학습병행 외부평가 출제 전문가입니다.
주어진 학습모듈 PDF 내용을 기반으로 객관식/주관식 시험 문제를 출제하세요.

${levelDesc}

규칙:
1. 반드시 PDF 내용에서만 출제
2. LV1: type은 반드시 "objective" (4지선다, 진위형 포함)
   LV2: type은 "objective" 또는 "short" (단답형) 혼합
   LV3: type은 "objective", "short", "essay"(논술/계산) 혼합
3. objective는 options 배열(4개)과 answer(0-3 인덱스) 필수
4. short/essay는 modelAnswer(모범답안) 필수
5. 모든 문제에 explanation(해설) 필수
6. 랜덤 seed: ${Date.now()}

반드시 아래 JSON 배열로만 응답하세요:
[{"type":"objective","question":"문제","options":["①","②","③","④"],"answer":0,"explanation":"해설"},
 {"type":"short","question":"문제","modelAnswer":"모범답안","explanation":"해설"},
 {"type":"essay","question":"문제","modelAnswer":"모범답안","explanation":"해설"}]

${selectedCount}문제를 출제하세요.`;

  try {
    const pdfUrl = BASE_URL + '/' + (DEPT_PDF[selectedDept] || 'files/공개자료.pdf');
    let pdfBase64 = null;
    try {
      const pdfResp = await fetch(pdfUrl);
      if (pdfResp.ok) {
        const blob = await pdfResp.blob();
        pdfBase64 = await blobToBase64(blob);
      }
    } catch(e) {}

    const msgContent = pdfBase64
      ? [{type:'document',source:{type:'base64',media_type:'application/pdf',data:pdfBase64}},{type:'text',text:`${DEPARTMENTS.find(d=>d.id===selectedDept)?.label} 학습모듈입니다. LV${selectedLevel} 난이도로 ${selectedCount}개 문제를 출제해주세요. JSON 배열로만 응답하세요.`}]
      : [{type:'text',text:`${DEPARTMENTS.find(d=>d.id===selectedDept)?.label} 직무의 외부평가 문제를 LV${selectedLevel} 난이도로 ${selectedCount}개 출제해주세요. JSON 배열로만 응답하세요.`}];

    const resp = await fetch(PROXY_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:sys,messages:[{role:'user',content:msgContent}]})
    });
    if (!resp.ok) throw new Error('API 오류 ' + resp.status);
    const data = await resp.json();
    let text = (data.content||[]).filter(i=>i.type==='text').map(i=>i.text).join('');
    text = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    // JSON 파싱 강화: 배열만 추출
    const jsonMatch = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('JSON 응답을 찾을 수 없어요');
    const questions = JSON.parse(jsonMatch[0]);
    if (!Array.isArray(questions) || !questions.length) throw new Error('잘못된 응답');

    currentQuestions = questions;
    currentQ = 0;
    userAnswers = new Array(questions.length).fill(null);
    answered = false;

    document.getElementById('w-loading').style.display = 'none';
    document.getElementById('w-quiz').style.display = 'block';
    renderWrittenQuestion();
  } catch(e) {
    document.getElementById('w-loading').style.display = 'none';
    document.getElementById('w-quiz').style.display = 'block';
    document.getElementById('w-quiz').innerHTML = `<div class="error-box fade-in"><div class="error-icon">😥</div><div class="error-msg">${e.message||'문제 생성 실패'}<br>잠시 후 다시 시도해주세요</div><button class="error-retry" onclick="resetWritten()">돌아가기</button></div>`;
  }
}

function renderWrittenQuestion() {
  const q = currentQuestions[currentQ];
  const total = currentQuestions.length;
  const pct = ((currentQ+1)/total*100).toFixed(0);
  answered = userAnswers[currentQ] !== null;
  const ol = ['①','②','③','④','⑤'];
  const typeLabel = {objective:'객관식', short:'단답형', essay:'논술/계산형'}[q.type]||'';
  const lvColor = {1:'var(--green)',2:'var(--yellow)',3:'var(--red)'}[selectedLevel];

  let html = `<div class="quiz-wrap">
    <div class="progress-bar-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${lvColor},${lvColor}88)"></div></div>
      <div class="progress-text">${currentQ+1} / ${total}</div>
    </div>
    <div class="q-card fade-in">
      <span class="q-type-badge" style="background:${lvColor}22;color:${lvColor}">${typeLabel} · LV${selectedLevel}</span>
      <div class="q-num">문제 ${currentQ+1}</div>
      <div class="q-text">${q.question}</div>
    </div>`;

  if (q.type === 'objective') {
    html += '<div class="options">';
    (q.options||[]).forEach((opt,i) => {
      let cls = 'opt-btn';
      if (answered) {
        cls += ' disabled';
        if (i === q.answer) cls += ' correct';
        else if (userAnswers[currentQ] === i && i !== q.answer) cls += ' wrong';
      } else if (userAnswers[currentQ] === i) cls += ' selected';
      html += `<button class="${cls}" onclick="selectOpt(${i})"><span class="opt-num">${ol[i]}</span><span>${opt}</span></button>`;
    });
    html += '</div>';
    if (answered && q.explanation) html += `<div class="explanation fade-in"><strong>💡 해설</strong><br>${q.explanation}</div>`;
    html += `<div class="nav-btns">`;
    if (!answered) html += `<button class="nav-btn btn-confirm" id="confirmBtn" onclick="confirmObjAnswer()" disabled>정답 확인</button>`;
    else if (currentQ < total-1) html += `<button class="nav-btn btn-next" onclick="nextQuestion()">다음 문제 →</button>`;
    else html += `<button class="nav-btn btn-submit" onclick="showWrittenResult()">결과 보기 🎯</button>`;
  } else {
    // 주관식/논술형
    const saved = typeof userAnswers[currentQ] === 'string' ? userAnswers[currentQ] : '';
    html += `<textarea class="subj-input" id="subjInput" placeholder="${q.type==='essay'?'계산 과정과 답을 모두 작성해주세요...':'답을 입력하세요...'}" oninput="saveSubjAnswer()">${saved}</textarea>`;
    if (answered && q.explanation) {
      html += `<div class="explanation fade-in"><strong>📋 모범답안</strong><br>${q.modelAnswer||''}</div>`;
      html += `<div class="explanation fade-in" style="background:#e8f5e9;border-color:#a5d6a7;"><strong>💡 해설</strong><br>${q.explanation}</div>`;
    }
    html += `<div class="nav-btns">`;
    if (!answered) html += `<button class="nav-btn btn-confirm" onclick="confirmSubjAnswer()">답안 제출</button>`;
    else if (currentQ < total-1) html += `<button class="nav-btn btn-next" onclick="nextQuestion()">다음 문제 →</button>`;
    else html += `<button class="nav-btn btn-submit" onclick="showWrittenResult()">결과 보기 🎯</button>`;
  }
  html += `</div></div>`;
  document.getElementById('w-quiz').innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectOpt(idx) {
  if (answered) return;
  userAnswers[currentQ] = idx;
  renderWrittenQuestion();
  const btn = document.getElementById('confirmBtn');
  if (btn) btn.disabled = false;
}
function saveSubjAnswer() {
  const el = document.getElementById('subjInput');
  if (el) userAnswers[currentQ] = el.value;
}
function confirmObjAnswer() { answered=true; renderWrittenQuestion(); }
function confirmSubjAnswer() {
  const el = document.getElementById('subjInput');
  if (el && el.value.trim()) { userAnswers[currentQ]=el.value; answered=true; renderWrittenQuestion(); }
  else alert('답을 입력해주세요');
}
function nextQuestion() { currentQ++; answered=userAnswers[currentQ]!==null; renderWrittenQuestion(); }

function showWrittenResult() {
  // 객관식만 자동 채점, 주관식은 제출 기록
  let correct=0, wrong=[], total=currentQuestions.length;
  currentQuestions.forEach((q,i) => {
    if (q.type==='objective') {
      if (userAnswers[i]===q.answer) correct++;
      else wrong.push({index:i,q,ua:userAnswers[i]});
    } else { correct += 0.5; } // 주관식은 부분 점수
  });
  const objCount = currentQuestions.filter(q=>q.type==='objective').length;
  const score = objCount > 0 ? Math.round(correct/total*100) : 70;
  const passing = 60, passed = score >= passing;
  const ol=['①','②','③','④'];

  let html = `<div class="result-wrap">
    <div class="result-circle ${passed?'pass':'fail'} fade-in">
      <div class="result-score">${score}</div>
      <div class="result-label">점</div>
    </div>
    <div class="result-pass ${passed?'pass':'fail'} fade-in">${passed?'🎉 합격 기준 충족!':'📚 추가 학습이 필요해요'}</div>
    <div class="stat-row fade-in">
      <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">총 문항</div></div>
      <div class="stat-box"><div class="stat-num c">${Math.round(correct)}</div><div class="stat-lbl">맞은 수</div></div>
      <div class="stat-box"><div class="stat-num w">${total-Math.round(correct)}</div><div class="stat-lbl">틀린 수</div></div>
    </div>`;

  if (wrong.length) {
    html += `<div class="review-title fade-in">📌 오답 해설</div>`;
    wrong.forEach((w,i) => {
      html += `<div class="review-card fade-in" style="animation-delay:${i*0.04}s">
        <div class="review-q">Q${w.index+1}. ${w.q.question}</div>
        <div class="review-ans my">내 답: ${w.ua!==null?ol[w.ua]+' '+(w.q.options?.[w.ua]||''):'미선택'}</div>
        <div class="review-ans right">정답: ${ol[w.q.answer]} ${w.q.options?.[w.q.answer]||''}</div>
        ${w.q.explanation?`<div class="review-exp">💡 ${w.q.explanation}</div>`:''}
      </div>`;
    });
  }

  html += `<div class="result-btns">
    <button class="btn-retry" onclick="resetWritten()">🔄 다시 선택</button>
    <button class="btn-home" onclick="retryWritten()">같은 조건 다시 풀기</button>
  </div></div>`;

  document.getElementById('w-quiz').style.display='none';
  document.getElementById('w-result').style.display='block';
  document.getElementById('w-result').innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetWritten() {
  document.getElementById('w-result').style.display='none';
  document.getElementById('w-quiz').style.display='none';
  document.getElementById('w-config').style.display='none';
  document.getElementById('w-dept').style.display='block';
  selectedDept=null; selectedLevel=null; selectedCount=null;
}
function retryWritten() {
  document.getElementById('w-result').style.display='none';
  startWrittenQuiz();
}

  el.innerHTML = '<div class="section-label">면접 능력단위를 선택하세요</div>';

    el.innerHTML += '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">해당 학과의 면접 능력단위 정보를 준비 중이에요</div></div>';

  }
  units.forEach(unit => {
    const card = document.createElement('div');

    card.onclick = () => startInterviewQuiz(unit.name);
    el.appendChild(card);
  });
}

async function startInterviewQuiz(unit) {
  selectedUnit = unit;
  document.getElementById('i-unit').style.display='none';
  document.getElementById('i-loading').style.display='block';

  const dept = DEPARTMENTS.find(d=>d.id===selectedDept);
  const sys = `당신은 한국 일학습병행 외부평가 면접 심사위원입니다.
${dept?.label||''} 직무의 "${unit}" 능력단위에 대한 면접 질문을 생성하세요.

규칙:
1. 실무 상황 기반 질문 (실제 업무 상황을 제시하고 어떻게 처리할지 묻는 방식)
2. 5개 질문 생성
3. 각 질문에 evaluationPoints(평가 포인트 3가지), modelAnswer(모범답안) 포함
4. 랜덤 seed: ${Date.now()}

JSON 배열로만 응답:
[{"question":"면접 질문","evaluationPoints":["포인트1","포인트2","포인트3"],"modelAnswer":"모범답안"}]`;

  try {
    const resp = await fetch(PROXY_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,system:sys,
        messages:[{role:'user',content:`${dept?.label} ${unit} 능력단위 면접 질문 5개를 JSON으로만 출제해주세요.`}]})
    });
    if (!resp.ok) throw new Error('API 오류');
    const data = await resp.json();
    let text = (data.content||[]).filter(i=>i.type==='text').map(i=>i.text).join('');
    text = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const jsonMatch2 = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch2) throw new Error('JSON 응답을 찾을 수 없어요');
    interviewQuestions = JSON.parse(jsonMatch2[0]);
    if (!Array.isArray(interviewQuestions)||!interviewQuestions.length) throw new Error('잘못된 응답');

    currentIQ = 0;
    interviewScores = [];
    document.getElementById('i-loading').style.display='none';
    document.getElementById('i-quiz').style.display='block';
    renderInterviewQuestion();
  } catch(e) {
    document.getElementById('i-loading').style.display='none';
    document.getElementById('i-quiz').style.display='block';
    document.getElementById('i-quiz').innerHTML=`<div class="error-box fade-in"><div class="error-icon">😥</div><div class="error-msg">면접 질문 생성 실패<br>잠시 후 다시 시도해주세요</div><button class="error-retry" onclick="resetInterview()">돌아가기</button></div>`;
  }
}

function renderInterviewQuestion() {
  const q = interviewQuestions[currentIQ];
  const total = interviewQuestions.length;
  const pct = ((currentIQ+1)/total*100).toFixed(0);

  const html = `<div class="interview-wrap">
    <div class="progress-bar-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--purple),#a855f7)"></div></div>
      <div class="progress-text">${currentIQ+1} / ${total}</div>
    </div>
    <div class="interview-header fade-in">
      <div class="interview-step">면접 질문 ${currentIQ+1}/${total}</div>
      <div class="interview-unit">📋 ${selectedUnit}</div>
    </div>
    <div class="q-interview-card fade-in">
      <span class="interview-q-label">🎤 면접 질문</span>
      <div class="interview-q-text">${q.question}</div>
    </div>
    <div style="padding:0 0 8px;font-size:12px;color:var(--text2)">📌 평가 포인트: ${(q.evaluationPoints||[]).join(' · ')}</div>
    <textarea class="answer-textarea" id="interviewAnswer" placeholder="면접 답변을 작성해주세요. 실제 면접처럼 구체적으로 작성할수록 좋은 피드백을 받을 수 있어요."></textarea>
    <button class="submit-answer-btn" id="submitAnswerBtn" onclick="submitInterviewAnswer()">AI 피드백 받기 →</button>
  </div>`;

  document.getElementById('i-quiz').innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

async function submitInterviewAnswer() {
  const answer = document.getElementById('interviewAnswer')?.value?.trim();
  if (!answer) { alert('답변을 입력해주세요'); return; }

  const btn = document.getElementById('submitAnswerBtn');
  if (btn) { btn.disabled=true; btn.textContent='AI가 채점 중...'; }

  const q = interviewQuestions[currentIQ];
  const dept = DEPARTMENTS.find(d=>d.id===selectedDept);

  const sys = `당신은 일학습병행 외부평가 면접 채점 전문가입니다.
학생의 면접 답변을 채점하고 피드백을 제공하세요.

채점 기준:
- 내용의 정확성 (40점)
- 구체성/사례 제시 (30점)
- 전문성/용어 사용 (30점)

반드시 JSON으로만 응답:
{"score":85,"grade":"우수","strengths":"잘한 점","improvements":"개선할 점","modelComparison":"모범답안과 비교","tip":"실제 면접 팁"}`;

  try {
    const resp = await fetch(PROXY_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,
        messages:[{role:'user',content:`능력단위: ${selectedUnit}\n질문: ${q.question}\n평가포인트: ${(q.evaluationPoints||[]).join(', ')}\n모범답안: ${q.modelAnswer||''}\n\n학생 답변: ${answer}\n\n위 답변을 채점해주세요. JSON으로만 응답.`}]})
    });
    const data = await resp.json();
    let text = (data.content||[]).filter(i=>i.type==='text').map(i=>i.text).join('');
    text = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const jsonMatch3 = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch3) throw new Error('채점 응답 오류');
    const feedback = JSON.parse(jsonMatch3[0]);
    interviewScores.push({q:q.question, answer, ...feedback});
    renderInterviewFeedback(feedback, answer);
  } catch(e) {
    interviewScores.push({q:q.question, answer, score:60, grade:'보통', strengths:'', improvements:'피드백을 불러올 수 없어요', tip:''});
    renderInterviewFeedback({score:60,grade:'보통',strengths:'답변을 제출했습니다',improvements:'피드백 생성에 실패했어요',tip:''},answer);
  }
}

function renderInterviewFeedback(fb, answer) {
  const scoreColor = fb.score>=80?'var(--green)':fb.score>=60?'var(--yellow)':'var(--red)';
  const isLast = currentIQ >= interviewQuestions.length-1;

  const html = `<div class="interview-wrap">
    <div class="feedback-card fade-in">
      <div class="feedback-score-row">
        <div class="feedback-score-circle" style="background:${scoreColor}">${fb.score}</div>
        <div class="feedback-score-info">
          <div class="feedback-score-label">AI 채점 결과</div>
          <div class="feedback-score-val">${fb.grade||'보통'} <span style="font-size:14px;color:var(--text2)">/ 100점</span></div>
        </div>
      </div>
      <div class="feedback-section">
        <div class="feedback-section-title">✅ 잘한 점</div>
        <div class="feedback-text"><span class="feedback-strong">${fb.strengths||'-'}</span></div>
      </div>
      <div class="feedback-section">
        <div class="feedback-section-title">📈 개선할 점</div>
        <div class="feedback-text"><span class="feedback-weak">${fb.improvements||'-'}</span></div>
      </div>
      <div class="feedback-section">
        <div class="feedback-section-title">📋 모범답안과 비교</div>
        <div class="feedback-text">${fb.modelComparison||interviewQuestions[currentIQ]?.modelAnswer||'-'}</div>
      </div>
      ${fb.tip?`<div class="feedback-section"><div class="feedback-section-title">💡 면접 팁</div><div class="feedback-text">${fb.tip}</div></div>`:''}
    </div>
    <button class="next-q-btn" onclick="${isLast?'showInterviewResult()':'nextInterviewQuestion()'}">${isLast?'📊 최종 결과 보기':'다음 질문 →'}</button>
  </div>`;

  document.getElementById('i-quiz').innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function nextInterviewQuestion() {
  currentIQ++;
  renderInterviewQuestion();
}

function showInterviewResult() {
  const avg = Math.round(interviewScores.reduce((s,r)=>s+(r.score||0),0)/interviewScores.length);
  const grade = avg>=90?'최우수':avg>=80?'우수':avg>=70?'양호':avg>=60?'보통':'미흡';
  const passed = avg >= 60;

  let html = `<div class="interview-result">
    <div class="interview-score-summary fade-in">
      <div style="font-size:14px;opacity:0.8">🎤 ${selectedUnit} 면접 최종 결과</div>
      <div class="int-score-big">${avg}점</div>
      <div class="int-score-sub">${interviewScores.length}개 질문 평균</div>
      <div class="int-result-label">${passed?'✅ '+grade:'❌ 추가 연습 필요'}</div>
    </div>`;

  interviewScores.forEach((r,i) => {
    const c = r.score>=80?'var(--green)':r.score>=60?'var(--yellow)':'var(--red)';
    html += `<div class="review-card fade-in" style="animation-delay:${i*0.05}s">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:13px;font-weight:700;color:var(--text)">Q${i+1}. ${r.q?.substring(0,40)||''}...</div>
        <div style="font-size:16px;font-weight:900;color:${c}">${r.score}점</div>
      </div>
      <div style="font-size:12px;color:var(--text2)">${r.improvements||''}</div>
    </div>`;
  });

  html += `<div class="result-btns" style="padding:0 0 40px">
    <button class="btn-retry" onclick="resetInterview()">🔄 다시 선택</button>
    <button class="btn-home" onclick="retryInterview()">같은 단위 다시 풀기</button>
  </div></div>`;

  document.getElementById('i-quiz').style.display='none';
  document.getElementById('i-result').style.display='block';
  document.getElementById('i-result').innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetInterview() {
  document.getElementById('i-result').style.display='none';
  document.getElementById('i-quiz').style.display='none';
  document.getElementById('i-unit').style.display='none';
  document.getElementById('i-dept').style.display='block';
  selectedDept=null; selectedUnit=null;
}
function retryInterview() {
  document.getElementById('i-result').style.display='none';
  startInterviewQuiz(selectedUnit);
}

// ── 유틸 ──
function blobToBase64(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onloadend=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(blob);
  });
}

// ── 초기화 ──
renderDeptList('w-dept');
renderDeptList('i-dept');
</script>
